version: 0
notes: |
  Convex is the operational source of truth. Every collection includes `tenant_id` and emits
  domain events into `events_outbox` using the common envelope. Many collections also include
  `zone_id` to support RBAC and dashboards.

envelope:
  fields:
    - id: uuid
    - tenant_id: uuid
    - type: string
    - occurred_at: timestamptz
    - actor: string
    - correlation_id: string
    - mode: string # road|rail (launch)
    - zone_id: uuid
    - payload: object

collections:
  customer_accounts:
    key: account_id
    fields:
      tenant_id: uuid
      name: string # pii: true, sensitivity: low
      billing_contact: object # pii: true, sensitivity: moderate
      attributes: object
    indexes:
      - name: by_tenant_name
        fields: [tenant_id, name]

  orders:
    key: order_id
    fields:
      tenant_id: uuid
      account_id: uuid
      external_order_id: string
      ingest_fingerprint_last_seen_at: timestamptz
      planning_status: enum[forecast,provisional,firm]
      plan_version: int
      scenario_id: string
      auto_firm: boolean
      firm_by_at: timestamptz
      firmed_at: timestamptz
      not_before_at: timestamptz
      freeze_from_at: timestamptz
      status: enum[New,Validated,Planned,Dispatched,InTransit,Arrived,Delivered,Exception,Cancelled]
      order_type: enum[Standard,HighValue,DG,TemperatureControlled,Oversized,Express,Return]
      priority: enum[High,Medium,Low]
      pickup: object # address, window_start, window_end, warehouse_id? (pii: address may be sensitive)
      dropoff: object # address, window_start, window_end (pii: address may be sensitive)
      items: array # {line_id, gtin, sku, desc, qty, weight_kg, volume_m3}
      constraints: object # {dg_class?, temp_range?}
      multi_stop: boolean
      zone_id: uuid
      created_at: timestamptz
      updated_at: timestamptz
    events:
      - order.ingested
      - order.validated
      - order.updated
      - order.cancelled
    indexes:
      - name: by_external
        fields: [tenant_id, external_order_id]
      - name: firming_queue
        fields: [tenant_id, planning_status, firm_by_at]

  delivery_tasks:
    key: task_id
    fields:
      tenant_id: uuid
      order_id: uuid
      leg_id: uuid
      seq: int
      status: enum[Pending,Scheduled,InTransit,Arrived,Delivered,Exception]
      vehicle_id: uuid
      driver_id: uuid
      route_id: uuid
      zone_id: uuid
      created_at: timestamptz
      updated_at: timestamptz
    events:
      - task.scheduled
      - task.rescheduled
      - arrived.at_pickup
      - departed.from_pickup
      - arrived.at_dropoff
      - delivered
      - exception.raised
      - exception.resolved

  itineraries:
    key: itinerary_id
    fields:
      tenant_id: uuid
      order_id: uuid
      status: enum[Planned,InProgress,Completed,Cancelled]
      created_at: timestamptz
    indexes:
      - name: by_order
        fields: [tenant_id, order_id]

  itinerary_legs:
    key: leg_id
    fields:
      tenant_id: uuid
      itinerary_id: uuid
      seq: int
      mode: enum[road,rail,sea]
      origin_node_id: uuid
      dest_node_id: uuid
      planned_start: timestamptz
      planned_end: timestamptz
      carrier: string
      asset_ref: string
      -- external sea leg details (optional at launch)
      external_operator: string?
      booking_ref: string?
      vessel: string?
      voyage: string?
      load_port: string?
      discharge_port: string?
      etd: timestamptz?
      eta: timestamptz?
      docs: array? # refs to documents (B/L, DG declaration, MSDS)
      -- dangerous goods metadata (per leg)
      dg_class: string?
      UN_number: string?
      packing_group: string?
      placarding_required: boolean?
      msds_ref: string?
      route_restrictions: array?
      -- financial/clearances for sea handoff
      customs_cleared: boolean?
      biosecurity_cleared: boolean?
      duties_and_taxes_settled: boolean?
      port_charges_settled: boolean?

  route_plans:
    key: route_id
    fields:
      tenant_id: uuid
      vehicle_id: uuid
      planned_distance_km: number
      planned_time_min: number
      cost_estimate_aud: number
      created_at: timestamptz

  route_stops:
    key: composite(route_id, stop_seq)
    fields:
      tenant_id: uuid
      route_id: uuid
      stop_seq: int
      order_id: uuid
      stop_type: enum[pickup,dropoff,break,other,decant]
      lat: number
      lon: number
      eta: timestamptz
      status: string
      service_seconds: int?
      locked_sequence: boolean?
      required_window_start: timestamptz?
      required_window_end: timestamptz?
      site_requirements: object? # {credentials: [{type, issuer, expires_at}], ppe: [...], permits: [...], escort_required: bool}

  vehicles:
    key: vehicle_id
    fields:
      tenant_id: uuid
      rego: string
      capacity_weight_kg: number
      capacity_volume_m3: number
      capacity_pallets: int?
      refrigerated: boolean?
      tanker: boolean?
      compartments: array?
      sanitation_status: string?
      last_cleaned_at: timestamptz?
      cleaning_method: string?
      temp_sensor: boolean?
      owner_type: enum[tenant,carrier]?
      owner_id: uuid?
      operator_carrier_id: uuid?
      status: string
      zone_id: uuid

  drivers:
    key: driver_id
    fields:
      tenant_id: uuid
      name: string # pii: true, sensitivity: low
      license_class: string
      fatigue_profile: enum[StandardHours] # launch
      credentials: array? # {type, issuer, issued_at, expires_at} (pii: true, sensitivity: moderate)
      zone_id: uuid

  warehouses:
    key: warehouse_id
    fields:
      tenant_id: uuid
      name: string
      zone_id: uuid
      hours: string
      geofence_ref: string # link to Postgres/geo store

  dock_slots:
    key: slot_id
    fields:
      tenant_id: uuid
      warehouse_id: uuid
      duration_min: int # default 60

  alerts:
    key: alert_id
    fields:
      tenant_id: uuid
      type: string
      severity: enum[critical,high,medium,low]
      entity_type: string
      entity_id: uuid
      zone_id: uuid
      created_at: timestamptz
      resolved_at: timestamptz?

  pod_artifacts_meta:
    key: artifact_id
    fields:
      tenant_id: uuid
      order_id: uuid
      task_id: uuid
      artifact_type: enum[photo,signature,scan] # pii: photo/signature
      storage_url: string
      metadata: object # {farm_id, compartment_id, sample_id, seal_numbers[], product_temp_c}
      created_at: timestamptz

  settings:
    key: setting_id
    fields:
      tenant_id: uuid
      scope_type: enum[platform,tenant,zone,fleet,vehicle,user,mode]
      scope_id: uuid
      group: string
      key: string
      value_type: string
      value_json: object
      is_secret_ref: boolean
      updated_at: timestamptz

  lookup_values:
    key: id
    fields:
      tenant_id: uuid
      group: string
      code: string
      label: string
      attributes: object

  audit_log:
    key: id
    fields:
      tenant_id: uuid
      entity_type: string
      entity_id: uuid
      before: object
      after: object
      occurred_at: timestamptz

  events_outbox:
    key: id
    fields:
      tenant_id: uuid
      envelope: object
      delivered: boolean
      attempts: int
      last_error: string?
      created_at: timestamptz
      delivered_at: timestamptz?
  carriers:
    key: carrier_id
    fields:
      tenant_id: uuid
      name: string
      zones: array
      contact: object
      compliance_docs: array
      active: boolean

  containers:
    key: container_id
    fields:
      tenant_id: uuid
      iso_code: string # e.g., T11, T14
      dg_class: string?
      UN_number: string?
      packing_group: string?
      seals: array?
      reefer_setpoint_c: number?
      vgm_kg: number?
      owner: string?
      status: string?
