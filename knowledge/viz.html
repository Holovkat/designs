__OKF_DATA__ = [{"filepath":"architecture/design-standard-spec.md","content":"---\ntype: Architecture\ntitle: DESIGN.md Standard Specification\ndescription: The DESIGN.md format for describing visual identity to coding agents, with YAML tokens and markdown rationale\nresource: ./design-standard-v01/README.md\ntags: [designs, design-md, standard, tokens, yaml, frontend, identity]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# DESIGN.md Format\n\nThe DESIGN.md format is a self-contained, plain-text representation of a design system. It combines machine-readable design tokens (YAML front matter) with human-readable design rationale (markdown prose). Tokens give coding agents exact values; prose explains *why* those values exist and how to apply them.\n\n## File Structure\n\nA DESIGN.md file has two layers:\n\n1. **YAML front matter** - Machine-readable design tokens delimited by `---` fences at the top of the file.\n2. **Markdown body** - Human-readable design rationale organized into `##` sections.\n\nThe tokens are the normative values. The prose provides context for application.\n\n## Token Schema\n\n```yaml\nversion: <string>          # optional, current: \"alpha\"\nname: <string>\ndescription: <string>      # optional\ncolors:\n  <token-name>: <Color>    # \"#1A1C1E\" format (sRGB hex)\ntypography:\n  <token-name>: <Typography>  # fontFamily, fontSize, fontWeight, lineHeight, letterSpacing\nrounded:\n  <scale-level>: <Dimension>  # number + unit (px, em, rem)\nspacing:\n  <scale-level>: <Dimension | number>\ncomponents:\n  <component-name>:\n    <token-name>: <string | token reference>\n```\n\n### Token Types\n\n| Type | Format | Example |\n|------|--------|---------|\n| Color | `#` + hex (sRGB) | `\"#1A1C1E\"` |\n| Dimension | number + unit | `48px`, `-0.02em` |\n| Token Reference | `{path.to.token}` | `{colors.primary}` |\n| Typography | object with fontFamily, fontSize, etc. | See schema above |\n\n### Component Tokens\n\nComponents map a name to sub-token properties: `backgroundColor`, `textColor`, `typography`, `rounded`, `padding`, `size`, `height`, `width`. Variants (hover, active) are expressed as separate component entries.\n\n## Section Order\n\nSections use `##` headings. They can be omitted but those present must appear in order:\n\n1. Overview (alias: Brand & Style)\n2. Colors\n3. Typography\n4. Layout (alias: Layout & Spacing)\n5. Elevation & Depth (alias: Elevation)\n6. Shapes\n7. Components\n8. Do's and Don'ts\n\n## CLI Tools\n\nThe `@google/design.md` npm package provides linting, diffing, and export:\n\n- **lint**: Validate structure, check broken refs, WCAG contrast, section order\n- **diff**: Compare two DESIGN.md files for token-level regressions\n- **export**: Convert tokens to Tailwind theme config or W3C DTCG format\n\n## Linting Rules\n\n| Rule | Severity | What it checks |\n|------|----------|----------------|\n| broken-ref | error | Token references that don't resolve |\n| missing-primary | warning | No `primary` color defined |\n| contrast-ratio | warning | Component color pairs below WCAG AA (4.5:1) |\n| orphaned-tokens | warning | Color tokens never referenced by components |\n| section-order | warning | Sections out of canonical order |\n\n## Status\n\nThe format is at version `alpha`. The spec, token schema, and CLI are under active development.\n\n## Related Concepts\n\n- [Templates Architecture](./templates-architecture.md)\n- [Design Tokens](../domain/design-tokens.md)\n- [UX Design Standards](../domain/ux-design-standards.md)\n- [OKF Standard Specification](./okf-standard-spec.md)\n"},{"filepath":"architecture/hook-system.md","content":"---\ntype: Architecture\ntitle: Post-Commit Hook System\ndescription: Lightweight commit metadata capture to knowledge/inbox/ via git post-commit hook\nresource: ./templates/okf/post-commit.sh\ntags: [okf, git, hooks, post-commit, inbox, capture]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Post-Commit Hook System\n\nThe OKF post-commit hook is a bash script that captures lightweight commit metadata into `knowledge/inbox/` after each commit. It is intentionally minimal: it records what changed, not why. The heavy curation work (session synthesis, concept upsert) is done separately by the curation agent.\n\n## Installation\n\nThe hook is installed by `install-okf.sh` into `.githooks/post-commit` in the project root. The installer sets the local `core.hooksPath` to `.githooks` (not global, to avoid conflicts with other projects). See [Installer Design](./installer-design.md).\n\n## What It Captures\n\nFor each commit, the hook writes a markdown file to `knowledge/inbox/` with:\n\n- **Frontmatter:** `type: Inbox`, `title` (commit subject), `description` (commit SHA + author), `tags: [commit]`, `timestamp` (commit timestamp), `commit_sha`, `branch`, and `issue_refs` (extracted from commit subject via `#[0-9]+` pattern).\n- **Body:** Commit metadata (subject, author, branch, timestamp, issues) and a `## Changed Files` section listing all files changed in the commit via `git show --pretty=\"\" --name-only HEAD`.\n- **Notes section:** A comment placeholder for the curation agent to expand with session context.\n\n## Filename Format\n\n`<timestamp-with-dashes>-<slug>.md` where the timestamp is derived from the commit timestamp (colons and periods replaced with dashes, truncated to 19 chars) and the slug is the commit subject lowercased with non-alphanumeric characters replaced by hyphens, truncated to 50 characters.\n\n## Guard Conditions\n\nThe hook exits early (exit 0) in several cases:\n\n1. **No knowledge directory:** If `knowledge/` does not exist, the hook does nothing. This allows the hook to remain installed even if the OKF bundle is removed.\n2. **Knowledge is gitignored:** Uses `git check-ignore -q knowledge/` to detect if the knowledge directory is gitignored. If so, the hook skips.\n3. **Duplicate prevention:** If the target inbox file already exists (e.g., after a rebase that replays the same commit), the hook exits without writing a duplicate.\n\n## Edge Cases and `set -e`\n\nThe script uses `set -euo pipefail`. Several commands have fallbacks to handle edge cases:\n\n- `git rev-parse --show-toplevel` falls back to `pwd` if not in a git repo.\n- `git rev-parse --short HEAD` falls back to `'unknown'`.\n- `git rev-parse --abbrev-ref HEAD` falls back to `'unknown'`.\n- `git log -1 --format=...` calls fall back to default values.\n- Issue ref extraction uses `|| true` to avoid failing when no issue numbers are found.\n- Slug generation has a fallback to `\"commit\"` if the slug is empty.\n\n## Separation of Concerns\n\nThe hook is deliberately lightweight because git hooks must be fast. Curation requires full session context, code analysis, and GitHub issue fetching, which is too heavy for a commit hook. The [Post-Commit Capture Model](../decisions/post-commit-capture-model.md) decision documents this rationale.\n\n## Curation Pipeline\n\nInbox items written by the hook are later processed by the curation agent (see [Curation Pass](../process/curation-pass.md)). The agent reads inbox items, existing concepts, the codebase, and referenced GitHub issues to create or update permanent concept files.\n"},{"filepath":"architecture/installer-design.md","content":"---\ntype: Architecture\ntitle: OKF Installer Design\ndescription: How install-okf.sh deploys the knowledge directory, viewer, hook, and AGENTS.md section\nresource: ./templates/okf/install-okf.sh\ntags: [okf, installer, bash, deployment, setup]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Installer Design\n\n`install-okf.sh` is a bash script that deploys the OKF knowledge bundle into a target project. It is run once per project to create the initial structure and install the post-commit hook.\n\n## Usage\n\n```bash\nbash install-okf.sh <target-project-path>\n```\n\nThe script uses `set -euo pipefail` for strict error handling.\n\n## Step 1: Create Knowledge Directory Structure\n\nThe script creates a `knowledge/` directory with subdirectories: `inbox/`, `inbox/processed/`, `architecture/`, `components/`, `domain/`, `decisions/`, `process/`, `deprecation/`, `state/`.\n\nIf `knowledge/` already exists, the script warns and skips directory creation, preserving existing concepts.\n\nTemplate index files are copied from `templates/` if available. The root `index.md` is generated with `sed` substitution for `{{PROJECT_NAME}}` (set to the target directory basename) and `{{DATE}}` (set to the current UTC date). If no templates directory exists, minimal index files are created inline.\n\n## Step 2: Install Viewer and Generator\n\n`viewer.html` and `generate-viz.js` are copied from the script directory into `knowledge/`. The user is told to run `node knowledge/generate-viz.js knowledge/` to generate the self-contained `viz.html`.\n\n## Step 3: Legacy Documentation Detection\n\nIf the target project has a `docs/` directory with markdown files, the script prints guidance about legacy alignment mode: existing docs stay in place, OKF concepts reference them via the `resource` field, and a legacy scan should be run to create reference concepts. See [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md).\n\n## Step 4: Install Post-Commit Hook\n\nThe hook is installed to `.githooks/post-commit` in the project root:\n\n1. Create `.githooks/` directory if it does not exist.\n2. If an existing `post-commit` hook is found, back it up to `post-commit.bak`.\n3. Copy `post-commit.sh` to `.githooks/post-commit`.\n4. `chmod +x` the hook to make it executable.\n5. Set **local** `core.hooksPath` to `.githooks` via `git -C \"$TARGET\" config core.hooksPath .githooks`.\n\nUsing local (not global) `core.hooksPath` is deliberate: it prevents conflicts with other projects that may have different hook configurations. If the target is not yet a git repo, the script advises running `git config core.hooksPath .githooks` after `git init`.\n\nSee [Hook System](./hook-system.md) for the hook's behaviour.\n\n## Step 5: Update AGENTS.md\n\nThe script appends the OKF Knowledge Bundle section from `AGENTS-OKF-SECTION.md` to the project's `AGENTS.md`:\n\n- If `AGENTS.md` exists and already contains \"OKF Knowledge Bundle\", it is skipped.\n- If `AGENTS.md` exists without the OKF section, the section is appended with a separator.\n- If `AGENTS.md` does not exist, it is created with the OKF section as its content.\n\nSee [Migrate AGENTS.md](../process/migrate-agents-md.md) for the full migration process.\n\n## Post-Install Guidance\n\nThe script prints next steps: commit the `knowledge/` directory, ensure the post-commit hook is active, agents should read `knowledge/index.md` before work, use `/okf-capture` after sessions, and run `/okf-curate` periodically.\n\n## Relationship to Deployment Runbook\n\nThe installer handles Phase 1 (Mechanical Install) of the [deployment workflow](../process/deploy-okf.md). The remaining phases (seeding, epic processing, schema diagrams, AGENTS.md migration, curation, viewer generation, verification) are performed by agents following the runbook.\n"},{"filepath":"architecture/okf-standard-spec.md","content":"---\ntype: Architecture\ntitle: OKF Standard Specification\ndescription: The v0.1 specification defining the Open Knowledge Format convention\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, standard, specification, frontmatter, concepts]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Standard v0.1\n\nThe Open Knowledge Format (OKF) defines a convention for maintaining project knowledge as markdown files with structured frontmatter, stored in git alongside code. It is designed so that AI agents can read project knowledge before starting work and capture session context after completing work.\n\n## Design Principles\n\n1. **Git is canonical.** All knowledge lives in markdown files committed to the project repo. No external system is the source of truth.\n2. **Agents read first.** Before starting work, agents read the OKF bundle to understand current state, architecture, and prior decisions.\n3. **Two-phase capture.** Commit-time writes lightweight session syntheses to an inbox. A curation pass later upserts permanent concept files with full context.\n4. **Progressive disclosure.** Index files at each level provide summaries. Agents read the index, then drill into specific concepts only when relevant.\n5. **Deprecation is explicit.** When a concept is superseded, the old file is moved to `deprecation/` with a `supersedes` link, not deleted.\n\n## Directory Structure\n\nEach project repo gets a `knowledge/` directory with subdirectories for each concept type: `inbox/`, `architecture/`, `components/`, `domain/`, `decisions/`, `process/`, `deprecation/`, and `state/`. Each subdirectory has its own `index.md`. The root has `index.md` and `log.md`.\n\n## Concept Types\n\nEight types map to directories: Architecture, Component, Domain, Decision, Process, Deprecation, State, and Inbox. The `type` field in frontmatter determines which directory a concept belongs to. See [Concept Types](../domain/concept-types.md) for details.\n\n## Frontmatter\n\nAll OKF files use YAML frontmatter. The only required field is `type`. Recommended fields include `title`, `description`, `resource`, `tags`, and `timestamp`. Extension fields include `status`, `supersedes`, `issue_refs`, `epic_refs`, `session_id`, `commit_sha`, and `branch`. See [Frontmatter Schema](../domain/frontmatter-schema.md) for the full specification.\n\n## Key Rules\n\n- Never delete concept files. Move superseded ones to `deprecation/` instead.\n- Always update `index.md` files when adding, updating, or removing concepts.\n- One concept per file. Do not mix topics or types.\n- Use lowercase, consistent tags across all concepts.\n- The `resource` field should point to the relevant code file, issue, or existing doc.\n- For legacy projects, concepts reference existing docs via `resource` rather than duplicating content. See [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md).\n\n## Curation\n\nThe curation agent reads all unprocessed inbox items, existing concept files, the codebase, and GitHub issues referenced by `issue_refs`. It creates or updates concept files, moves superseded concepts to `deprecation/`, processes inbox items, and updates all indexes and `log.md`. See [Curation Pass](../process/curation-pass.md).\n\n## Agent Onboarding\n\n1. Read `knowledge/index.md` for an overview of all concept groups.\n2. Read `knowledge/state/index.md` for the current state of play.\n3. Read `knowledge/deprecation/index.md` to understand what has been superseded.\n4. Read concept files relevant to the work area (identified by tags and titles).\n5. After completing work, the commit-time hook captures a session synthesis to `knowledge/inbox/`.\n\n## Versioning\n\n- `log.md` tracks knowledge evolution at the bundle level.\n- Git history provides full diff tracking for every concept file.\n- The `supersedes` field links deprecated concepts to their replacements.\n- The OKF standard version is recorded in the root `index.md`.\n"},{"filepath":"architecture/templates-architecture.md","content":"---\ntype: Architecture\ntitle: Templates Directory Architecture\ndescription: Organisation of the templates directory containing instructional documents, functional design, and UI/UX guidelines\nresource: ./templates/\ntags: [designs, templates, architecture, directory-structure, organisation]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Templates Directory Architecture\n\nThe `templates/` directory is the reusable planning and instructional library of the designs repository. It contains three main subdirectories plus a root-level AGENTS.md, a DESIGN.md template, and the TFD (Technical Functional Requirements Document) template.\n\n## Directory Structure\n\n```text\ntemplates/\n├── AGENTS.md                              Templates area agent instructions\n├── DESIGN.template.md                     Starter template for DESIGN.md files\n├── Frontend-Technical-Functional-Requirements-Document-TFD.md\n├── agile_pm_prompt.md                     (empty placeholder)\n├── architecture.md                        Core architecture sidecar model\n├── close_out_items_shipping.md            Closeout checklist\n├── convex-self-hosted-quickref.md         Convex quick reference\n├── convex-self-hosted-setup.md            Convex setup guide\n├── deployment-guide.md                    Deployment guide\n├── generate-claude-agents.md              CLAUDE.md generation guide\n├── generate_agents.md                     AGENTS.md generation guide\n├── github-usage-system-prompt.md          GitHub usage system prompt\n├── github-workflow.md                     Git stacking workflow guide\n├── index.md                               Templates index\n├── kickoff-requirements-spec.md           Kickoff requirements template\n├── okf/                                   OKF system templates\n├── project_management_prompt.md           (empty placeholder)\n├── stripe-payment-gateway.md              Stripe integration guide\n├── tailwind.md                            Tailwind CSS guide\n├── ui-ux-guidelines/                      UI/UX design pattern references\n├── upgrade-template.md                    Version upgrade template\n├── ux_design_standards.md                 shadcn/ui design system guidelines\n└── work-os-auth.md                        WorkOS authentication guide\n```\n\n## Subdirectories\n\n### instructional-documents/\n\nThe main instructional area with guides, commands, skills, hooks, scripts, and worktree guidance. Has its own AGENTS.md with Graphite stacking workflow instructions for documentation work. Contains:\n\n- **commands/** - Slash command templates (plan-feature, plan-bugfix, plan-github, plan-review, compliance-review, uat, end-session, join-session, next-phase, release-assess, kingmode)\n- **skills/** - Project-local skills (plan-review, release-assess, vibe-fix, worktree-session-lifecycle, worktree-toolkit-init)\n- **hooks/** - Git hooks (pre-commit, post-commit, post-edit-lint, code-review-checkpoint, sanity-check, pre-completion-build, batch-lint-check)\n- **scripts/** - Shell scripts (release-vector-assess, worktree session management, droid worktree)\n- **worktrees/** - Worktree session guidance and metadata\n- **install-session-workflows.sh** - Installer for refreshing commands, hooks, scripts, skills, and worktree guidance into another project\n\n### functional-design/\n\nPhased implementation checklist templates. The template baseline is preserved in `00-TEMPLATE-IMPLEMENTATION-CHECKLIST.md`, while `00-IMPLEMENTATION-CHECKLIST.md` tracks the live implementation status for the designs repo itself. Phased files range from `01-ARCHITECTURE-OVERVIEW.md` through `99-DEPLOYMENT-STRATEGY.md`.\n\n### ui-ux-guidelines/\n\nDesign token and interface pattern references with a machine-readable `design-tokens.json` for Figma/Style Dictionary. Contains pattern guides for components, forms, data display, interactive elements, and layouts.\n\n### okf/\n\nOKF system templates including the standard specification, deployment runbook, installer script, post-commit hook, viz generator, and viewer.\n\n## Related Concepts\n\n- [DESIGN.md Standard Specification](./design-standard-spec.md)\n- [Design Tokens](../domain/design-tokens.md)\n- [Component Patterns](../components/component-patterns.md)\n- [Planning Decomposition](../process/planning-decomposition.md)\n- [Implementation Checklist](../process/implementation-checklist.md)\n- [Install Session Workflows](../process/install-session-workflows.md)\n- [OKF Standard Specification](./okf-standard-spec.md)\n"},{"filepath":"architecture/viewer-architecture.md","content":"---\ntype: Architecture\ntitle: OKF Viewer Architecture\ndescription: Single-file HTML viewer with browse and graph tabs, mermaid rendering, and link interception\nresource: ./templates/okf/viewer.html\ntags: [okf, viewer, html, cytoscape, mermaid, frontend]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Viewer Architecture\n\nThe OKF viewer is a single-file HTML application (`viewer.html`) that renders a knowledge bundle as an interactive browse-and-graph interface. It requires no build step and runs in any modern browser.\n\n## Overall Structure\n\nThe file contains all CSS, HTML, and JavaScript inline. External dependencies are loaded from CDN: Cytoscape.js (graph layout), marked.js (markdown rendering), and mermaid.js (diagram rendering). The page uses a dark theme (GitHub-style `#0d1117` background).\n\n## Two Tabs\n\n### Browse Tab\n\n- Left sidebar: a folder tree grouped by concept directory (architecture, components, domain, decisions, process, deprecation, state, inbox). Each directory shows a coloured dot and concept count. Files are listed alphabetically by title. Deprecated concepts show a circle marker.\n- Right panel: full-width detail view showing the selected concept's rendered markdown, frontmatter badges (type, status, tags), and backlinks.\n\n### Graph Tab\n\n- Left: a Cytoscape.js force-directed graph where nodes are concepts (coloured by type) and edges are cross-links between concepts. Clicking a node shows its detail.\n- Right: a 480px detail panel showing the selected node's rendered content.\n- Type filter buttons appear in the toolbar, allowing toggling of concept types.\n- Cose layout with animate, padding 40, idealEdgeLength 80, nodeRepulsion 8000.\n\n## Markdown Rendering\n\nConcept bodies are parsed with `marked.parse()`. Frontmatter is displayed separately as badges and monospace metadata lines (resource, timestamp, issue_refs, supersedes).\n\n## Mermaid Rendering\n\nAfter markdown is rendered, the viewer scans for `<pre><code>` blocks whose content starts with `erDiagram`, `flowchart`, `graph`, or `sequenceDiagram`. These are replaced with mermaid divs and rendered via `mermaid.run()`. Rendering is wrapped in try-catch so errors do not break navigation. Mermaid is initialised with `theme: 'dark'` and `securityLevel: 'loose'`.\n\n## Link Interception\n\nRelative `.md` links in concept bodies and frontmatter are intercepted on click. The resolution algorithm:\n\n1. Take the href from the anchor element.\n2. Skip if the href starts with `http` or `#`.\n3. Prepend the current concept's directory as the base path.\n4. Normalise `../` segments by removing the preceding directory component.\n5. Remove `./` segments.\n6. Strip the `.md` extension to produce a concept ID.\n7. Look up the concept ID in the loaded concepts array.\n8. If found, display that concept in the same detail panel and select its graph node.\n\nConcept IDs are the file path with the `.md` extension removed (e.g., `architecture/viewer-architecture`). See [Link Resolution](../domain/link-resolution.md) for more detail.\n\n## Search\n\nA search input in the toolbar filters concepts by title, ID, tags, and description. In browse mode, it filters the tree. In graph mode, it hides non-matching nodes and edges.\n\n## Data Loading\n\nThe viewer supports three loading modes:\n1. **Embedded data:** `generate-viz.js` injects concept data as a JSON array into the `__OKF_DATA__` variable. The viewer auto-loads on page open. See [Viz Generator Design](./viz-generator-design.md).\n2. **Folder picker:** The \"Open Folder\" button uses `window.showDirectoryPicker()` to load a `knowledge/` directory.\n3. **Drag and drop:** Dropping a `knowledge/` folder onto the page loads it via the File System API.\n\nIn all cases, files are filtered to `.md` only, excluding `index.md`, `log.md`, and hidden files. HTML and JS files in the knowledge directory are also skipped.\n\n## Concept Processing\n\nThe `buildConcept` function parses frontmatter, determines the concept type (from frontmatter or directory path), extracts cross-links from the markdown body, and builds a concept object. The `processConcepts` function computes backlinks by scanning all extracted links and matching them against concept IDs.\n"},{"filepath":"architecture/viz-generator-design.md","content":"---\ntype: Architecture\ntitle: Viz Generator Design\ndescription: How generate-viz.js embeds concept data into viewer.html to produce self-contained viz.html\nresource: ./templates/okf/generate-viz.js\ntags: [okf, viz, generator, nodejs, viewer]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Viz Generator Design\n\n`generate-viz.js` is a Node.js script that reads all markdown concept files from a `knowledge/` directory and produces a self-contained `viz.html` with the data embedded as JSON. The resulting file can be opened in any browser without a folder picker.\n\n## Usage\n\n```bash\nnode knowledge/generate-viz.js [knowledge-dir]\n```\n\nDefaults to the current directory if no argument is given. Output is `viz.html` in the knowledge directory.\n\n## How It Works\n\n### 1. Recursive File Reading\n\nThe `readDirRecursive` function walks the knowledge directory recursively. It skips:\n- Files and directories starting with `.` (hidden files)\n- `viewer.html` and `viz.html` (the viewer files themselves)\n- `index.md` and `log.md` (structural files, not concepts)\n- Non-`.md` files\n\nEach remaining `.md` file is read as UTF-8 and stored as `{ filepath, content }` where `filepath` is the relative path from the knowledge root (e.g., `architecture/viewer-architecture`).\n\n### 2. Data Embedding\n\nThe script reads `viewer.html` from the knowledge directory. It finds the line `let __OKF_DATA__ = null;` in the viewer's JavaScript and replaces it with `__OKF_DATA__ = <json>;` where `<json>` is the `JSON.stringify` output of the files array.\n\nThe JSON serialisation handles all escaping correctly because `JSON.stringify` produces valid JavaScript for string values, arrays, and objects.\n\n### 3. Output\n\nThe modified HTML is written to `viz.html` in the knowledge directory. The file is fully self-contained: all concept data is embedded, and external dependencies (Cytoscape, marked, mermaid) are loaded from CDN.\n\n## Concept IDs\n\nConcept IDs are the file path with the `.md` extension stripped. For example, `architecture/viewer-architecture.md` becomes the concept ID `architecture/viewer-architecture`. This matches the ID scheme used by the viewer for link resolution. See [Link Resolution](../domain/link-resolution.md).\n\n## Viewer Auto-Loading\n\nThe viewer's `loadEmbeddedData()` function checks whether `__OKF_DATA__` is defined and is an array. If so, it processes the concepts and renders the UI immediately on page load, without requiring the user to pick a folder. The folder picker and drag-and-drop features remain available as alternatives.\n\n## Relationship to Viewer\n\nThe viewer architecture is documented in [Viewer Architecture](./viewer-architecture.md). The viz generator is the standard way to produce a shareable, self-contained knowledge graph visualisation. It should be re-run after any knowledge changes to keep `viz.html` current. This is Phase 7 of the [deployment workflow](../process/deploy-okf.md).\n"},{"filepath":"components/component-patterns.md","content":"---\ntype: Component\ntitle: UI Component Patterns\ndescription: Minimalist, borderless component conventions using shadcn/ui with progressive disclosure and opacity hierarchy\nresource: ./templates/ui-ux-guidelines/component-patterns.md\ntags: [designs, ui, components, shadcn, borderless, minimalist, patterns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# UI Component Patterns\n\n## Design Philosophy: Minimalist and Borderless\n\nInspired by the **Notional** project, components follow these principles:\n\n1. **Borderless by default** - Cards use background color, not borders\n2. **Progressive disclosure** - Controls appear on hover\n3. **Opacity hierarchy** - Secondary elements use `opacity-30` -> `opacity-100`\n4. **Subtle elevation** - Prefer `shadow-sm` + `backdrop-blur` over heavy shadows\n5. **Generous whitespace** - Let content breathe\n\n## Key Patterns\n\n### Borderless Card\n\nCards use `bg-card rounded-lg hover:shadow-md` instead of borders. Controls appear via `opacity-0 group-hover:opacity-100`.\n\n### Ghost Element\n\nSubtle elements that become prominent on hover, used for \"Add New\" inline creation cards with dashed borders.\n\n### Watermark Branding\n\nUltra-light brand presence using `font-extralight opacity-20 pointer-events-none`.\n\n## Component Library: shadcn/ui\n\nUses shadcn/ui with the \"new-york\" style variant. Components are copied into `src/components/ui/` and customized. Available primitives include: Button, Card, Dialog, Sheet, Table, Tabs, Form, Input, Select, Checkbox, Switch, Badge, Avatar, Tooltip, DropdownMenu, Command, Skeleton, ScrollArea, Separator, Sidebar.\n\n## Tech Stack\n\n- **Framework**: Next.js 16 (App Router), React 19\n- **Styling**: Tailwind CSS v4 with CSS Variables (OKLCH)\n- **Icons**: Lucide React\n- **Fonts**: Inter (sans), JetBrains Mono (mono), Georgia (serif)\n- **State**: React hooks + Convex real-time database\n- **Theming**: next-themes (dark/light mode)\n- **Utilities**: class-variance-authority (cva), clsx, tailwind-merge\n\n## Core Principles\n\n1. Semantic color tokens - never use raw colors; use design tokens (`text-muted-foreground`, `bg-card`)\n2. Borderless first - default to no borders; add only when necessary\n3. Progressive reveal - hide secondary actions until hover/focus\n4. Dark mode first - design for dark mode, ensure light mode works\n5. Mobile responsive - all layouts adapt from mobile to desktop\n6. Accessibility - ARIA labels, keyboard navigation, focus management\n7. Reduced motion - respect `prefers-reduced-motion` preferences\n\n## Related Concepts\n\n- [Design Tokens](../domain/design-tokens.md)\n- [UX Design Standards](../domain/ux-design-standards.md)\n- [Form Patterns](./form-patterns.md)\n- [Data Display Patterns](./data-display-patterns.md)\n- [Interactive Patterns](./interactive-patterns.md)\n- [Layout Patterns](./layout-patterns.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"components/data-display-patterns.md","content":"---\ntype: Component\ntitle: Data Display Patterns\ndescription: Tables, cards, lists, and Kanban board conventions with inline creation and click-to-inspect philosophy\nresource: ./templates/ui-ux-guidelines/data-display-patterns.md\ntags: [designs, ui, data-display, tables, cards, kanban, patterns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Data Display Patterns\n\n## Design Philosophy\n\nData display follows the minimalist approach:\n- **Inline creation** - \"Add new\" as a ghost card within lists, not a separate button\n- **Click-to-inspect** - Clicking a row/card opens a slide-out inspector panel\n- **Progressive disclosure** - Details revealed on selection, not cluttering the list\n- **No action buttons on cards** - Cards are for viewing/navigation only\n- **Vertical ellipsis for actions** - Edit, delete, and other actions hidden behind menu\n- **Badges and icons only** - Status indicators, counts, and icons are acceptable; buttons are not\n\n## Card Action Philosophy\n\nCards should be clean and scannable. The primary interaction is clicking to view/inspect.\n\n### Allowed on cards\n- Badges, counts, icons, status indicators\n- Metadata rows with icon + count pairs\n\n### Not allowed on cards\n- Edit, Delete, Archive buttons inline\n\n## Vertical Ellipsis Menu\n\nAll destructive and edit actions accessed via a vertical ellipsis menu that appears on hover:\n- `absolute top-2 right-2 opacity-0 group-hover:opacity-100`\n- Contains Edit, Delete, and other actions\n- Opens as a dropdown menu\n\n## Data Table Pattern\n\nUses shadcn/ui Table components with:\n- Column headers with sort indicators\n- Row click to open inspector\n- Pagination at bottom\n- Empty state with ghost \"Add New\" card\n- Loading state with Skeleton rows\n\n## List View Pattern\n\nLists use card grids or stacked cards:\n- `grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4`\n- Ghost \"Add New\" card at the end of the list\n- Cards show title, description, status badge, metadata\n\n## Kanban Board Pattern\n\nKanban boards use columns with draggable cards:\n- Column headers with count badges\n- Horizontal scroll for columns\n- `@dnd-kit` for drag and drop\n- Ghost \"Add New\" card at bottom of each column\n- Card click opens inspector\n\n## Inspector Panel Pattern\n\nClicking a card/row opens a slide-out inspector:\n- Uses shadcn/ui `Sheet` component\n- Shows full details\n- Contains action buttons (Edit, Delete) in the panel\n- Closes on escape or backdrop click\n\n## Empty State Pattern\n\nWhen no data exists:\n- Centered icon + message\n- Ghost \"Add New\" card or button\n- Encouraging copy\n\n## Related Concepts\n\n- [Component Patterns](./component-patterns.md)\n- [Form Patterns](./form-patterns.md)\n- [Interactive Patterns](./interactive-patterns.md)\n- [Layout Patterns](./layout-patterns.md)\n- [Design Tokens](../domain/design-tokens.md)\n"},{"filepath":"components/form-patterns.md","content":"---\ntype: Component\ntitle: Form Patterns\ndescription: Form field conventions using shadcn/ui, React Hook Form, Zod validation, and wizard patterns\nresource: ./templates/ui-ux-guidelines/form-patterns.md\ntags: [designs, ui, forms, react-hook-form, zod, validation, patterns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Form Patterns\n\n## Form Field Anatomy\n\nStandard form fields use the shadcn/ui Form component wrapping React Hook Form:\n\n- `FormField` -> `FormItem` -> `FormLabel` + `FormControl` + `FormDescription` + `FormMessage`\n- Validation errors display via `FormMessage`\n- Helper text via `FormDescription`\n\n## Simple Form Pattern (useState)\n\nFor simpler forms without React Hook Form:\n- Use `useState` for field values\n- Manual validation with `toast.error()` for feedback\n- `isSaving` state for loading states\n- `toast.success()` on success, `toast.error()` on failure\n\n## React Hook Form Pattern\n\nFor complex forms:\n- `useForm` with Zod schema via `zodResolver`\n- Type-safe form values from Zod schema\n- `form.control` passed to `FormField` components\n- `form.handleSubmit(onSubmit)` for submission\n\n## Form Validation (Zod)\n\nZod schemas define validation rules:\n- Required fields: `z.string().min(1, \"Message\")`\n- Email: `z.string().email()`\n- Numbers: `z.number().min(0)` or `z.coerce.number()`\n- Enums: `z.enum([...])`\n- Optional: `.optional()` or `.nullable()`\n\n## Multi-Step Wizard Pattern\n\nWizards use a step-based approach:\n- `currentStep` state (1, 2, 3...)\n- Step validation before advancing\n- Progress indicator\n- Back/Next navigation\n- Final submission on last step\n\n## Form Layout Conventions\n\n- Forms use `space-y-4` or `space-y-6` for vertical spacing\n- Labels above inputs\n- Required fields marked with `*`\n- Helper text below inputs in `text-muted-foreground`\n- Error messages in `text-destructive`\n\n## Convex Mutation Integration\n\nForms typically submit via Convex mutations:\n- `useMutation(api.entities.create)` or `useMutation(api.entities.update)`\n- Optimistic updates where appropriate\n- `toast.success()` / `toast.error()` for feedback\n- Close dialog or navigate after success\n\n## Related Concepts\n\n- [Component Patterns](./component-patterns.md)\n- [Data Display Patterns](./data-display-patterns.md)\n- [Interactive Patterns](./interactive-patterns.md)\n- [Layout Patterns](./layout-patterns.md)\n- [Design Tokens](../domain/design-tokens.md)\n"},{"filepath":"components/interactive-patterns.md","content":"---\ntype: Component\ntitle: Interactive Patterns\ndescription: Drag and drop, modals, slide-out panels, command palettes, and toast notifications\nresource: ./templates/ui-ux-guidelines/interactive-patterns.md\ntags: [designs, ui, interactive, drag-drop, modals, dnd-kit, patterns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Interactive Patterns\n\n## Drag and Drop\n\nUses **@dnd-kit** for drag-and-drop interactions.\n\n### Basic DnD Setup\n\n- `DndContext` wrapper with sensors and collision detection\n- `PointerSensor` with 8px activation distance\n- `DragOverlay` for drag ghost rendering\n- `closestCenter` collision detection\n- Drag start/end/cancel handlers\n\n### Draggable Items\n\n- `useDraggable` hook from `@dnd-kit/core`\n- Data passed via `data.current` for identification\n- Visual feedback during drag (opacity, scale)\n- Drop zones use `useDroppable` hook\n\n### Sortable Lists\n\n- `useSortable` hook for reorderable lists\n- `SortableContext` with `verticalListSortingStrategy`\n- Reorder mutations to backend on drop\n\n## Modal Dialogs\n\nUses shadcn/ui `Dialog` component:\n- `DialogTrigger` opens the dialog\n- `DialogContent` contains the form/content\n- `DialogHeader` with title and description\n- `DialogFooter` with action buttons\n- Close on escape or backdrop click\n- Focus management handled by Radix\n\n## Slide-Out Panels (Sheets)\n\nUses shadcn/ui `Sheet` component:\n- `side=\"right\"` for right-side panels (default)\n- Inspector panels for detail views\n- `side=\"bottom\"` for mobile-friendly bottom sheets\n- Full-height content with scroll area\n\n## Command Palette\n\nUses shadcn/ui `Command` component:\n- Triggered by keyboard shortcut (Ctrl+K)\n- Fuzzy search across items\n- Grouped results (pages, actions, settings)\n- Keyboard navigation (arrow keys, enter)\n\n## Toast Notifications\n\nUses `sonner` or shadcn/ui `Toaster`:\n- `toast.success()` for success messages\n- `toast.error()` for error messages\n- `toast.loading()` for async operations\n- Auto-dismiss after timeout\n- Action buttons in toasts for undo\n\n## Keyboard Shortcuts\n\n- Ctrl+K: Open command palette\n- Esc: Close dialogs/sheets\n- Enter: Confirm in dialogs\n- Arrow keys: Navigate lists and command palette\n\n## Loading States\n\n- `Skeleton` components for content placeholders\n- `isPending` / `isLoading` states from Convex queries\n- Spinner for inline loading\n- Disabled state for buttons during async operations\n\n## Optimistic Updates\n\nConvex supports optimistic updates:\n- `withOPTIMISTIC_UPDATE` on mutations\n- Immediate UI feedback before server confirmation\n- Rollback on error\n\n## Related Concepts\n\n- [Component Patterns](./component-patterns.md)\n- [Form Patterns](./form-patterns.md)\n- [Data Display Patterns](./data-display-patterns.md)\n- [Layout Patterns](./layout-patterns.md)\n- [Design Tokens](../domain/design-tokens.md)\n"},{"filepath":"components/layout-patterns.md","content":"---\ntype: Component\ntitle: Layout Patterns\ndescription: Page layout structure, sidebar navigation, responsive design, and provider hierarchy\nresource: ./templates/ui-ux-guidelines/layout-patterns.md\ntags: [designs, ui, layout, sidebar, responsive, providers, patterns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Layout Patterns\n\n## Root Layout\n\nThe app uses a global layout with nested providers:\n\n```tsx\n<html lang=\"en\" suppressHydrationWarning>\n  <body className={`${geistSans.variable} ${geistMono.variable} antialiased`}>\n    <ThemeProvider attribute=\"class\" defaultTheme=\"dark\" enableSystem>\n      <AuthKitProvider>\n        <ConvexClientProvider>\n          <OrganisationProvider>\n            <PersonaProvider>\n              {children}\n              <Toaster />\n            </PersonaProvider>\n          </OrganisationProvider>\n        </ConvexClientProvider>\n      </AuthKitProvider>\n    </ThemeProvider>\n  </body>\n</html>\n```\n\n## Provider Hierarchy\n\nProviders wrap the app in this order:\n1. `ThemeProvider` (next-themes) - dark/light mode\n2. `AuthKitProvider` (WorkOS) - authentication\n3. `ConvexClientProvider` - real-time database\n4. `OrganisationProvider` - org context\n5. `PersonaProvider` - user persona context\n6. `Toaster` - toast notifications\n\n## Full-Height Layout\n\nFor pages that fill the viewport:\n- `h-full w-full overflow-hidden bg-background`\n- `min-h-svh flex flex-col` with sticky header and scrollable main\n\n## Sidebar Layout\n\nUses shadcn/ui Sidebar component:\n- `SidebarProvider` wraps the layout\n- `Sidebar` with `SidebarContent`, `SidebarHeader`, `SidebarFooter`\n- `SidebarInset` for the main content area\n- Collapsible sidebar with rail mode\n- Dark sidebar on light mode (inverted)\n\n## Responsive Breakpoints\n\n- Mobile: default (< 768px)\n- Tablet: `md:` (768px+)\n- Desktop: `lg:` (1024px+)\n- Wide: `xl:` (1280px+)\n\n## Grid Patterns\n\n- Card grids: `grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4`\n- Two-column: `grid grid-cols-1 lg:grid-cols-2 gap-6`\n- Sidebar + content: flex with fixed sidebar and flexible main\n\n## Page Header Pattern\n\nStandard page header with title, description, and actions:\n- Title in `text-2xl font-semibold`\n- Description in `text-muted-foreground`\n- Actions (buttons) aligned right\n\n## Container Patterns\n\n- Full-width: no container, use `w-full`\n- Centered: `max-w-7xl mx-auto px-4`\n- Narrow content: `max-w-2xl mx-auto`\n\n## Sticky Header Pattern\n\n- `sticky top-0 z-20` with backdrop blur\n- `bg-background/80 backdrop-blur-sm`\n- Border bottom on scroll\n\n## Related Concepts\n\n- [Component Patterns](./component-patterns.md)\n- [Form Patterns](./form-patterns.md)\n- [Data Display Patterns](./data-display-patterns.md)\n- [Interactive Patterns](./interactive-patterns.md)\n- [Design Tokens](../domain/design-tokens.md)\n- [UX Design Standards](../domain/ux-design-standards.md)\n"},{"filepath":"decisions/documentation-first-approach.md","content":"---\ntype: Decision\ntitle: Documentation-First Approach\ndescription: Decision to make the designs repo documentation-first with README as GitHub index and HTML guide as canonical operating model\nresource: ./README.md\ntags: [designs, decision, documentation-first, readme, html-guide, operating-model]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Documentation-First Approach\n\n## Decision\n\nThe designs repository is documentation-first. The README is the GitHub index. The detailed workflow meta and stage-gate guidance lives in the HTML guide under `docs/workflow-guide/`.\n\n## Rationale\n\n1. **No build pipeline** - This repo contains no application code, only templates and documentation. A build pipeline would add unnecessary complexity.\n2. **GitHub Pages as delivery** - The rendered Pages site provides a polished, navigable experience for stakeholders without requiring a build step.\n3. **README as index** - The README serves as the entry point on GitHub, linking to the rendered Pages site and the template directories.\n4. **HTML guide as canonical** - The workflow guide HTML is the source of truth for the operating model, providing a richer experience than markdown alone.\n\n## Implementation\n\n- README links to: rendered Pages site, workflow guide, install guide, command pack, project skills, workflow installer, functional design templates, instructional documents, UI/UX guidelines\n- README contains mermaid diagrams for Planning Decomposition and Delivery Lifecycle\n- The HTML guide covers planning, plan review, Definition of Done ranking, approvals, CI/CD authority, QA/UAT, production approval, closeout, installation, and project-specific overlays\n- Validation is lightweight: `git diff --check` and reviewing changed markdown links\n\n## Alternatives Considered\n\n- **Full static site generator (Docusaurus, Astro)**: Rejected as overkill for a documentation-only repo. The HTML guide is hand-crafted.\n- **Markdown-only (no HTML guide)**: Rejected because the workflow guide benefits from interactive navigation, theming, and structured layout that HTML provides.\n- **Wiki or external docs platform**: Rejected because the repo should be self-contained and version-controlled.\n\n## Consequences\n\n- The HTML guide must be maintained alongside markdown docs\n- No CI/CD pipeline needed for this repo\n- GitHub Pages provides free hosting\n- Changes to the workflow guide require opening `docs/workflow-guide/index.html` locally to verify\n\n## Related Concepts\n\n- [Workflow Guide](../process/workflow-guide.md)\n- [Planning Decomposition](../process/planning-decomposition.md)\n- [Delivery Lifecycle](../process/delivery-lifecycle.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n- [Graphite Stacking for Docs](./graphite-stacking-for-docs.md)\n- [Legacy Alignment Mode](./legacy-alignment-mode.md)\n"},{"filepath":"decisions/graphite-stacking-for-docs.md","content":"---\ntype: Decision\ntitle: Graphite Stacking for Documentation Work\ndescription: Decision to use Graphite-style stacking workflow for managing dependent documentation changes\nresource: ./templates/instructional-documents/AGENTS.md\ntags: [designs, decision, graphite, stacking, documentation, git, workflow]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Graphite Stacking for Documentation Work\n\n## Decision\n\nWhen updating documentation, use the Graphite-style stacking workflow to manage dependent documentation changes. This is documented in the AGENTS.md files for both the templates area and the instructional-documents area.\n\n## Rationale\n\n1. **Dependent changes** - Documentation updates often depend on each other (e.g., updating a workflow guide depends on updating templates, which depends on updating reference docs). Stacking manages these dependencies naturally.\n2. **Small, focused PRs** - Each documentation change is reviewable independently, with clear scope.\n3. **Continue while waiting** - Authors can continue working on dependent docs while earlier PRs are under review.\n4. **Squash merge keeps history clean** - Each documentation change becomes a single atomic commit.\n\n## Implementation\n\n### Documentation Stack Workflow\n\n```bash\n# Base documentation update\ngit checkout main && git pull origin main\ngit checkout -b docs/update-workflow-guide\n\n# Dependent documentation updates\ngit checkout -b docs/update-related-templates\n# Target PR to docs/update-workflow-guide\n\n# Documentation that depends on templates\ngit checkout -b docs/update-example-guides\n# Target PR to docs/update-related-templates\n```\n\n### Branch Naming for Documentation\n\n- Workflow updates: `docs/update-workflow-name`\n- Technical guides: `docs/update-technology-name`\n- Templates: `docs/update-template-name`\n- Reference docs: `docs/update-reference-area`\n- Corrections: `docs/fix-documentation-issue`\n\n### Documentation Commit Messages\n\n```\ndocs(workflow): update GitHub workflow guide with new stack management\ndocs(template): enhance TFD template with validation examples\ndocs(guide): add WorkOS authentication integration steps\nfix(docs): correct broken links in architecture guide\nrefactor(docs): consolidate related authentication documentation\n```\n\n### Stack Management\n\nRebase documentation stack regularly to keep in sync with main. Use `--force-with-lease` for safety. When base documentation merges, update dependent branches by rebasing onto main and changing PR targets.\n\n## Alternatives Considered\n\n- **Single large PR for all doc changes**: Rejected because large PRs are harder to review and slower to merge.\n- **Sequential PRs (no stacking)**: Rejected because it blocks work on dependent changes while waiting for reviews.\n- **Direct commits to main**: Rejected because documentation changes still benefit from review.\n\n## Consequences\n\n- All documentation PRs must use squash merge\n- Stacks should be limited to 3-5 PRs\n- Authors need to manage rebasing when parent PRs merge\n- Force-with-lease is required instead of force push\n\n## Related Concepts\n\n- [GitHub Workflow Guide](../process/github-workflow.md)\n- [Documentation-First Approach](./documentation-first-approach.md)\n- [Workflow Guide](../process/workflow-guide.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"decisions/legacy-alignment-mode.md","content":"---\ntype: Decision\ntitle: Legacy Alignment Mode\ndescription: Keep existing docs in place rather than migrating content into OKF; concepts reference docs via resource field\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, legacy, docs, alignment, migration]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Decision: Legacy Alignment Mode\n\n## Context\n\nMany projects have substantial existing documentation in `docs/`, `docs/design/`, `docs/agents/`, and other directories. When deploying OKF, a decision must be made: should existing docs be migrated into `knowledge/`, or should they remain in place?\n\n## Decision\n\nExisting documentation stays where it is. OKF works as a curated knowledge graph layer over existing documentation. OKF concept files in `knowledge/` reference existing docs via the `resource` field.\n\n## How It Works\n\n1. Existing docs stay where they are. They are not moved into `knowledge/`.\n2. OKF concept files in `knowledge/` reference existing docs via the `resource` field.\n3. Each concept provides a structured summary, tags, and type classification for the referenced doc.\n4. Agents read the OKF index to find relevant concepts, then follow the `resource` link to the full source doc.\n5. The OKF bundle acts as a navigable, typed, searchable index over the existing documentation.\n\n## Rationale\n\n- **Avoids duplication:** Moving docs into `knowledge/` would create two copies of the same content, requiring synchronisation.\n- **Preserves existing content:** Detailed docs often contain formatting, diagrams, and depth that would be lost in a migration.\n- **Provides typed searchable index:** OKF concepts add structure (type, tags, description) that makes existing docs discoverable by agents.\n- **Non-destructive:** The deployment can be done without touching existing docs, reducing risk.\n- **Progressive migration:** Teams can gradually create OKF concepts for new knowledge while referencing existing docs for old knowledge.\n\n## Concept Content for Referenced Docs\n\nA concept that references an existing doc should contain:\n- A summary of the doc's key content (not a copy, a synthesis)\n- The most important decisions, patterns, or rules from the doc\n- Tags that make it discoverable\n- The `resource` field pointing to the source doc path (relative to repo root)\n\n## Greenfield vs Legacy\n\n| Aspect | Greenfield (new projects) | Legacy (existing docs) |\n|--------|--------------------------|----------------------|\n| Knowledge location | All in `knowledge/` | Existing docs stay in place, `knowledge/` references them |\n| Content | Full concepts written directly | Summaries with `resource` links to source docs |\n| Curation | Creates new concepts from inbox + code | Also scans existing docs and creates reference concepts |\n| Agent onboarding | Read `knowledge/` only | Read `knowledge/` index, follow `resource` links to full docs |\n\n## Legacy Scan\n\nWhen initializing OKF on a legacy project, the install script detects `docs/` and advises running a legacy scan. The curation agent or `/okf-curate` command scans `docs/`, `docs/design/`, `docs/agents/`, and other documentation directories, creating a concept for each significant doc with the `resource` field pointing to the source. See [Seed From Existing Docs](../process/seed-from-existing-docs.md).\n\n## Conflict Resolution\n\nWhen docs and OKF disagree, OKF is current. OKF concepts are the agent-facing entry points; they are curated and maintained. The `docs/` files are detailed references that may be outdated. If a conflict is found, the OKF concept should be updated to reflect the current state, and the source doc should be flagged for review.\n\n## Alternatives Considered\n\n- **Full migration:** Move all docs into `knowledge/`. Rejected because of duplication risk and the loss of formatting/depth in existing docs.\n- **Ignore existing docs:** Create OKF concepts only from code and sessions. Rejected because it wastes existing knowledge and forces agents to rediscover documented decisions.\n- **Centralised knowledge store:** Maintain a separate knowledge repository. Rejected in favour of [per-project bundles](./per-project-bundles.md).\n"},{"filepath":"decisions/per-project-bundles.md","content":"---\ntype: Decision\ntitle: Per-Project Knowledge Bundles\ndescription: Each project maintains its own knowledge/ directory in git rather than a centralised store\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, architecture, bundling, git, per-project]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Decision: Per-Project Knowledge Bundles\n\n## Context\n\nWhen designing OKF, a decision must be made about where knowledge is stored. Should each project have its own `knowledge/` directory, or should there be a centralised knowledge store that aggregates knowledge from multiple projects?\n\n## Decision\n\nEach project maintains its own `knowledge/` directory stored in git alongside the project's code. There is no centralised knowledge store.\n\n## Rationale\n\n- **Knowledge is project-specific:** Architecture decisions, domain logic, and component behaviour are unique to each project. A centralised store would mix unrelated knowledge and require complex filtering.\n- **Git is canonical:** OKF's first design principle is \"Git is canonical.\" Storing knowledge in the project repo ensures it is versioned alongside the code it describes. Changes to knowledge are reviewed in the same PRs as changes to code.\n- **Co-location with code ensures relevance:** When knowledge lives next to the code, developers and agents naturally encounter it. A separate store would be forgotten or fall out of sync.\n- **Simplicity:** No infrastructure is needed. No database, no server, no API. Just markdown files in a directory.\n- **Access control follows repo permissions:** If a developer has access to the repo, they have access to the knowledge. No separate access management needed.\n- **Branching and merging:** Knowledge can be branched and merged alongside code. Feature branches can include knowledge updates that are reviewed before merging.\n\n## How It Works\n\nEach project repo gets a `knowledge/` directory created by `install-okf.sh`. The directory contains:\n- `index.md` - root index with concept group counts\n- `log.md` - chronological update history\n- `inbox/` - staging area for commit-time captures\n- `architecture/`, `components/`, `domain/`, `decisions/`, `process/`, `deprecation/`, `state/` - concept directories\n\nThe entire `knowledge/` directory is committed to git. Agents read it before starting work and write to it after completing work. See [OKF Standard Spec](../architecture/okf-standard-spec.md).\n\n## Cross-Project Knowledge\n\nOKF does not provide a built-in mechanism for sharing knowledge across projects. If a team wants to share patterns or decisions across projects, they can:\n- Create a shared \"patterns\" repo with its own OKF bundle.\n- Reference external OKF bundles via URLs in concept `resource` fields.\n- Copy relevant concepts between project bundles manually.\n\nThis is a deliberate non-feature: cross-project knowledge sharing adds complexity and is better handled by the team's existing documentation practices.\n\n## Alternatives Considered\n\n- **Centralised knowledge store:** A single database or repository aggregating knowledge from all projects. Rejected because knowledge is project-specific, git is canonical, and centralisation adds infrastructure and access management complexity.\n- **Wiki or external system:** Use a wiki (e.g., Confluence, Notion) for project knowledge. Rejected because it violates the \"git is canonical\" principle and creates a dependency on external infrastructure.\n- **Per-team knowledge store:** One knowledge bundle per team, shared across the team's projects. Rejected because projects within a team may have different architectures and domain logic, leading to the same mixing problem as a centralised store.\n"},{"filepath":"decisions/post-commit-capture-model.md","content":"---\ntype: Decision\ntitle: Post-Commit Capture Model\ndescription: Capture commits via lightweight post-commit hook to inbox rather than real-time curation\nresource: ./templates/okf/post-commit.sh\ntags: [okf, hooks, capture, inbox, separation-of-concerns]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Decision: Post-Commit Capture Model\n\n## Context\n\nOKF needs to capture knowledge from development work. Two approaches were considered: real-time curation at commit time (the hook would analyse the commit and create/update concepts immediately) or a two-phase model (the hook writes lightweight metadata to the inbox, and a separate curation pass processes it later).\n\n## Decision\n\nUse a two-phase capture model:\n1. **Commit time:** The post-commit hook writes lightweight commit metadata to `knowledge/inbox/`.\n2. **Curation time:** A separate curation pass (triggered by `/okf-curate` or the okf-curator droid) processes inbox items into permanent concept files.\n\n## Rationale\n\n- **Hook must be fast:** Git hooks run on every commit. If the hook is slow (e.g., it calls AI APIs, fetches GitHub issues, reads the entire codebase), it degrades the developer experience and may cause commits to appear to hang.\n- **Curation needs full context:** To create a good concept, the curation agent needs the full session context, existing concepts, codebase state, and GitHub issue details. This is too heavy for a commit hook.\n- **Separation of concerns:** The hook's job is to record what happened. The curation agent's job is to understand what it means. Mixing these concerns would produce a hook that is both slow and produces low-quality concepts.\n- **Batch processing:** Curation can process multiple inbox items at once, synthesising across commits to create coherent concepts. Real-time curation would create one concept per commit, leading to fragmentation.\n- **On-demand scheduling:** Curation can be scheduled (e.g., nightly) or triggered on-demand. It does not need to run on every commit.\n\n## What the Hook Captures\n\nThe hook captures only metadata:\n- Commit SHA, subject, author, branch, timestamp\n- Changed files list\n- Issue refs extracted from commit subject (`#[0-9]+` pattern)\n\nThis is written to `knowledge/inbox/` as an Inbox-type markdown file. See [Hook System](../architecture/hook-system.md) and [Inbox Format](../domain/inbox-format.md).\n\n## What Curation Adds\n\nThe curation agent enriches the hook's metadata with:\n- Full session context (from agent-written inbox items)\n- GitHub issue content (fetched via `gh issue view`)\n- Existing concept files (to merge or supersede)\n- Codebase and git history analysis\n- Cross-links to related concepts\n\nSee [Curation Pass](../process/curation-pass.md).\n\n## Alternatives Considered\n\n- **Real-time curation in the hook:** The hook would call an AI API to generate concepts immediately. Rejected because hooks must be fast, and AI calls are slow and may fail.\n- **No hook, manual capture only:** Agents write inbox items manually after sessions. Rejected because it misses commits that happen without an agent session (e.g., human developers).\n- **Pre-commit hook:** Use a pre-commit hook instead of post-commit. Rejected because pre-commit hooks can block commits if they fail, and knowledge capture should never block development.\n"},{"filepath":"domain/concept-types.md","content":"---\ntype: Domain\ntitle: OKF Concept Types\ndescription: The 8 concept types and when to use each one\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, concepts, types, taxonomy]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Concept Types\n\nOKF defines eight concept types, each mapping to a directory in the `knowledge/` bundle. The `type` field in frontmatter determines which directory a concept belongs to.\n\n## Type Table\n\n| Type | Directory | Use For |\n|------|-----------|---------|\n| `Architecture` | `architecture/` | How the system is structured: data models, provider hierarchy, infrastructure |\n| `Component` | `components/` | UI components and their behavior: interaction patterns, HUD layouts |\n| `Domain` | `domain/` | Business logic and domain knowledge: entities, workflows, rules |\n| `Decision` | `decisions/` | Architectural decisions and rationale: trade-offs, why a choice was made |\n| `Process` | `process/` | How workflows operate: sprint flow, deployment gates, runbooks, agent definitions |\n| `Deprecation` | `deprecation/` | What was removed or superseded and why, with `supersedes` links to replacements |\n| `State` | `state/` | Current state of play: what works, what is in progress, what is blocked |\n| `Inbox` | `inbox/` | Staging items awaiting curation: session syntheses written at commit time |\n\n## Choosing a Type\n\n- **Architecture vs Component:** Architecture covers system structure and data models. Component covers UI-level behaviour and interaction patterns. If it is about how the system is built underneath, use Architecture. If it is about what the user sees and interacts with, use Component.\n- **Domain vs Architecture:** Domain covers business rules, entities, and workflows. Architecture covers technical structure. If it is about the problem space, use Domain. If it is about the solution space, use Architecture.\n- **Decision vs Architecture:** Decision records why a choice was made, with trade-offs and alternatives. Architecture describes what the system looks like. A concept can be both, but OKF prefers one concept per file. If the rationale is the main value, use Decision. If the structure description is the main value, use Architecture.\n- **Process vs Domain:** Process describes how workflows operate (sprint flow, deployment steps). Domain describes business logic and rules. If it is about how agents or humans work, use Process. If it is about the business domain, use Domain.\n- **State vs others:** State is a snapshot of the current situation. It changes frequently. Other types are more stable. There is typically one State concept per project, updated during curation passes.\n- **Deprecation:** Used when a concept is superseded. The old file is moved to `deprecation/` with a `supersedes` field pointing to the replacement. Never delete a concept file; always deprecate it.\n- **Inbox:** Temporary staging type. Inbox items are written by the post-commit hook or by agents after sessions. They are processed by the curation agent into permanent concepts and then moved to `inbox/processed/`. See [Inbox Format](./inbox-format.md).\n\n## Examples\n\n| Topic | Type | Rationale |\n|-------|------|-----------|\n| SpacetimeDB tenant data model | Architecture | System structure, data model |\n| Chat-lane UI component | Component | UI behaviour |\n| Route geometry calculation rules | Domain | Business logic |\n| Choice of SpacetimeDB over Postgres | Decision | Rationale and trade-offs |\n| Deployment gate workflow | Process | How work flows through gates |\n| Old routing engine replaced by new pipeline | Deprecation | Superseded pattern |\n| Current sprint status | State | What works, in progress, blocked |\n| Session synthesis from a commit | Inbox | Awaiting curation |\n\n## Rules\n\n- One concept per file. Do not mix types.\n- The `type` field is required in frontmatter.\n- Filenames should be slugified versions of the title.\n- Use the correct directory for each type. The curation agent enforces this.\n"},{"filepath":"domain/design-tokens.md","content":"---\ntype: Domain\ntitle: Design Tokens System\ndescription: OKLCH-based design token system with CSS variables, Tailwind v4 integration, and Solar Dusk color palette\nresource: ./templates/ui-ux-guidelines/design-tokens.md\ntags: [designs, design-tokens, oklch, tailwind, css-variables, color-palette, solar-dusk]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Design Tokens System\n\n## Color System\n\nFMS-GLM uses OKLCH color space for perceptually uniform colors. The theme is a warm cream/orange palette called \"Solar Dusk\".\n\n### Color Palette\n\n| Token | Light Mode | Dark Mode |\n|-------|-----------|-----------|\n| background | Warm cream `oklch(0.9851 0.0009 67.81)` | Warm dark grey `oklch(0.2165 0.0032 67.66)` |\n| foreground | Dark warm grey `oklch(0.2710 0.0045 67.64)` | Cream `oklch(0.9625 0.0022 67.80)` |\n| primary | Burnt orange `oklch(0.6905 0.1939 42.48)` | Same burnt orange |\n| card | Pure white | Slightly lighter grey |\n| destructive | Red `oklch(0.6356 0.2082 25.38)` | Same red |\n\nThe burnt orange primary color remains consistent across modes for brand recognition.\n\n### Sidebar (Inverted in Light Mode)\n\nIn light mode, the sidebar uses a dark background for contrast:\n- Sidebar background: same as light foreground (dark warm grey)\n- Sidebar foreground: same as light background (warm cream)\n\n### Chart Colors\n\nFive chart color tokens (chart-1 through chart-5) in burnt orange, warm yellow, deep blue, teal, and bright yellow. Adjusted for dark mode visibility.\n\n## Tailwind v4 Integration\n\nCSS variables are mapped to Tailwind theme tokens via the `@theme inline` directive:\n\n```css\n@theme inline {\n  --color-background: var(--background);\n  --color-foreground: var(--foreground);\n  --color-card: var(--card);\n  --color-primary: var(--primary);\n  /* ... all semantic tokens mapped */\n}\n```\n\n## Semantic Color Usage\n\n| Token | Purpose |\n|-------|---------|\n| `bg-background` | Page/section backgrounds |\n| `bg-card` | Card surfaces |\n| `bg-muted` | Subtle backgrounds, hover states |\n| `bg-primary` | Primary actions, active states |\n| `bg-destructive` | Error/danger |\n| `text-foreground` | Primary text |\n| `text-muted-foreground` | Secondary text, descriptions |\n| `text-primary` | Accent text, links |\n| `border-border` | Standard borders |\n| `border-input` | Form input borders |\n\n## Typography\n\n| Property | Value |\n|----------|-------|\n| Sans | Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto |\n| Mono | JetBrains Mono, Menlo, Monaco, Consolas |\n| Serif | Georgia, serif |\n| Tracking | -0.01em (tighter for modern look) |\n\nText sizes range from `text-xs` (12px) to `text-2xl` (24px). Font weights: normal (400), medium (500), semibold (600).\n\n## Spacing System\n\nBase unit is `--spacing: 0.25rem` (4px). Standard values: 2px (0.5), 4px (1), 8px (2), 12px (3), 16px (4), 24px (6), 32px (8).\n\n## Border Radius\n\nBase `--radius: 0.5rem` (8px). Derived: sm (4px), md (6px), lg (8px), xl (12px), full (9999px).\n\n## Shadows\n\nWarm-tinted shadows in light mode, deeper blacks in dark mode. Scale from `shadow-2xs` to `shadow-2xl`.\n\n## Z-Index Scale\n\n| Value | Usage |\n|-------|-------|\n| z-0 | Base layer |\n| z-10 | Floating elements |\n| z-20 | Sidebar rails, sticky headers |\n| z-30 | Dropdowns |\n| z-40 | Modals, sheets |\n| z-50 | Full-screen overlays |\n\n## Animation Tokens\n\nCustom animations: `settle` (card drop into place) and `scanLine` (barcode scanner). Default transitions: 150ms (quick), 200ms (standard), 300ms (smooth).\n\n## Machine-Readable Tokens\n\nA `design-tokens.json` file is provided for Figma/Style Dictionary integration.\n\n## Related Concepts\n\n- [DESIGN.md Standard Specification](../architecture/design-standard-spec.md)\n- [UX Design Standards](./ux-design-standards.md)\n- [Component Patterns](../components/component-patterns.md)\n- [Layout Patterns](../components/layout-patterns.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"domain/frontmatter-schema.md","content":"---\ntype: Domain\ntitle: OKF Frontmatter Schema\ndescription: Required and optional YAML frontmatter fields for OKF concept files\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, frontmatter, yaml, schema, metadata]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Frontmatter Schema\n\nAll OKF files use YAML frontmatter delimited by `---`. The frontmatter provides metadata for indexing, search, and provenance.\n\n## Required Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `type` | string | One of the eight concept types (Architecture, Component, Domain, Decision, Process, Deprecation, State, Inbox). Determines which directory the concept belongs to. |\n\n## Recommended Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `title` | string | Human-readable title for index listings and the viewer |\n| `description` | string | One-line summary for index listings and search |\n| `resource` | string | URI to the related code file, issue, or external resource. Relative path from repo root (e.g., `./src/db/schema.ts`) |\n| `tags` | array | Lowercase strings for search and filtering (e.g., `[backend, spacetime-db]`) |\n| `timestamp` | string | ISO 8601 datetime of creation or last update (e.g., `2026-06-29T10:00:00Z`) |\n\n## Extension Fields\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `status` | string | Lifecycle state: `active`, `deprecated`, `in-progress`, `blocked` |\n| `supersedes` | array | Filenames of concepts this one replaces (used in `deprecation/` entries) |\n| `issue_refs` | array | GitHub/GitLab issue numbers for traceability (e.g., `[1503]`) |\n| `epic_refs` | array | Epic issue numbers (e.g., `[1495]`) |\n| `session_id` | string | UUID of the session that produced this knowledge (used in inbox items) |\n| `commit_sha` | string | Git commit SHA that triggered the capture (used in inbox items) |\n| `branch` | string | Branch context (used in inbox items) |\n\n## How Each Field Is Used\n\n### type\nThe viewer uses this to colour-code nodes and badges. The Pi extension uses it to categorise search results. The curation agent uses it to determine which directory to place the concept in.\n\n### title\nDisplayed in the viewer's folder tree, graph node labels, and index tables. Used by the Pi extension's `/okf-query` command in search results.\n\n### description\nShown in index tables and search results. Used for quick scanning without opening the full concept.\n\n### resource\nRendered as a clickable link in the viewer's frontmatter section. Points to the source code, doc, or issue that the concept summarises. For legacy projects, this links to the existing doc that the concept references. See [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md).\n\n### tags\nUsed by the viewer's search filter and the Pi extension's `/okf-query` command. Should be lowercase and consistent across concepts.\n\n### timestamp\nUsed for chronological sorting and log entries. ISO 8601 format ensures parseability.\n\n### status\nControls visual indicators in the viewer: deprecated concepts show a circle marker in the tree and dashed borders in the graph. The curation agent updates status when concepts are superseded.\n\n### supersedes\nCreates a link from a deprecation entry to its replacement. Used for audit trails.\n\n### issue_refs / epic_refs\nThe curation agent fetches these GitHub issues via `gh issue view` to enrich concept content with full context (directives, acceptance criteria, reasoning). The Pi extension's `/okf-curate` command lists these for the curation prompt.\n\n### session_id / commit_sha / branch\nProvenance fields primarily used in inbox items written by the post-commit hook. They link the inbox item back to the specific commit and session that produced it.\n\n## Example\n\n```yaml\n---\ntype: Architecture\ntitle: SpacetimeDB Tenant Model\ndescription: Multi-tenant data isolation via SpacetimeDB\nresource: ./src/db/schema.ts\ntags: [backend, spacetime-db]\ntimestamp: 2026-06-29T10:00:00Z\nstatus: active\nissue_refs: [1503]\n---\n```\n"},{"filepath":"domain/inbox-format.md","content":"---\ntype: Domain\ntitle: OKF Inbox Format\ndescription: Session synthesis format for inbox items with frontmatter and body sections\nresource: ./templates/okf/OKF-STANDARD.md\ntags: [okf, inbox, session-synthesis, format, capture]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Inbox Format\n\nInbox items are session syntheses written at commit time or after work sessions. They use the same frontmatter as permanent concepts but with `type: Inbox`. They serve as staging material for the curation agent.\n\n## Two Sources of Inbox Items\n\n1. **Post-commit hook:** Automatically writes lightweight commit metadata (SHA, author, branch, changed files, issue refs extracted from commit subject). See [Hook System](../architecture/hook-system.md).\n2. **Agent capture:** After a meaningful work session, an agent writes a full session synthesis using the `/okf-capture` command or manually. This captures richer context: decisions, rationale, lessons learned.\n\n## Frontmatter\n\n```yaml\n---\ntype: Inbox\ntitle: Session 2026-06-29 - Route geometry QA fixes\ndescription: Session synthesis for route geometry work\ntags: [mobile, routing, qa]\ntimestamp: 2026-06-29T10:00:00Z\nsession_id: 6acfd15b-bdf5-4b4b-9c1b-daff51ff57c0\ncommit_sha: 5449a3d2\nbranch: codex/issue-1503\nissue_refs: [1503]\nepic_refs: [1495]\n---\n```\n\n### Key Fields\n\n- `type`: Always `Inbox` for inbox items.\n- `title`: Descriptive title for the session or commit.\n- `description`: One-line summary.\n- `tags`: Lowercase, relevant tags for the work area.\n- `timestamp`: ISO 8601 datetime.\n- `session_id`: UUID of the agent session (for agent-written items).\n- `commit_sha`: Short git SHA (for hook-written items).\n- `branch`: Branch name.\n- `issue_refs`: GitHub issue numbers referenced by the work.\n- `epic_refs`: Epic issue numbers.\n\nNot all fields are present in every item. Hook-written items have `commit_sha` and `branch` but not `session_id`. Agent-written items may have both.\n\n## Body Sections\n\nAgent-written session syntheses follow this structure:\n\n### What Was Done\nSummary of work completed in this session. What was built, fixed, or changed.\n\n### Decisions Made\nArchitectural or product decisions and their rationale. Why a particular approach was chosen over alternatives.\n\n### What Was Deprecated\nPatterns, components, or approaches that were removed or superseded during the session.\n\n### Lessons Learned\nInsights gained during the work. Things that would help future agents avoid mistakes or work more effectively.\n\n### Current State\nWhat works now, what is in progress, what is blocked. A snapshot of the situation after the session.\n\nHook-written items have a simpler body: commit metadata, changed files list, and a notes placeholder.\n\n## Filename Format\n\n`<ISO-timestamp-with-dashes>-<slugified-title>.md`\n\nThe timestamp has colons and periods replaced with dashes, truncated to 19 characters. The slug is the title lowercased with non-alphanumeric characters replaced by hyphens, truncated to 50 characters.\n\nExamples:\n- `2026-06-29T10-00-00-route-geometry-qa-fixes.md`\n- `2026-06-29T14-22-31-commit` (fallback slug for hook items)\n\n## Lifecycle\n\n1. **Written:** By the post-commit hook or an agent to `knowledge/inbox/`.\n2. **Awaiting curation:** Listed in `inbox/index.md`.\n3. **Processed:** The curation agent reads the item, creates or updates permanent concepts, then moves the item to `knowledge/inbox/processed/`.\n4. **Archived:** Processed items remain in `inbox/processed/` for audit trail purposes.\n\nSee [Curation Pass](../process/curation-pass.md) for the full curation workflow.\n\n## Content Focus\n\nInbox items are about the product, business logic, and application state, not just code diffs. The session synthesis should capture the full context so that another agent reading it knows exactly the current state of play. This is what makes the curation agent effective: it has rich material to work from, not just commit messages.\n"},{"filepath":"domain/index-structure.md","content":"---\ntype: Domain\ntitle: OKF Index Structure\ndescription: How index.md files work at the root and in each subdirectory\nresource: ./templates/okf/templates/index.md\ntags: [okf, index, structure, navigation, progressive-disclosure]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Index Structure\n\nOKF uses index files at two levels to provide progressive disclosure: agents read the index first, then drill into specific concepts only when relevant.\n\n## Root Index (`knowledge/index.md`)\n\nThe root index lists all concept groups with counts and descriptions:\n\n```markdown\n# Project Knowledge Index\n\n> Last updated: 2026-06-29\n> OKF Version: 0.1\n\n## Concept Groups\n\n| Group | Count | Description |\n|-------|-------|-------------|\n| [Architecture](./architecture/index.md) | 5 | How the system is structured |\n| [Components](./components/index.md) | 12 | UI components and behavior |\n| [Domain](./domain/index.md) | 8 | Business logic and domain knowledge |\n| [Decisions](./decisions/index.md) | 3 | Architectural decisions and rationale |\n| [Process](./process/index.md) | 4 | How workflows operate |\n| [Deprecation](./deprecation/index.md) | 2 | Superseded concepts |\n| [State](./state/index.md) | 1 | Current state of play |\n| [Inbox](./inbox/index.md) | 3 | Items awaiting curation |\n\n## Quick Links\n\n- [Update Log](./log.md)\n- [Knowledge Graph Viewer](./viewer.html)\n- [OKF Standard](https://github.com/holovkat/designs/blob/main/templates/okf/OKF-STANDARD.md)\n```\n\nThe root index also records the OKF standard version and links to the viewer and log.\n\n## Subdirectory Index (`knowledge/<type>/index.md`)\n\nEach subdirectory has its own `index.md` listing all concepts in that directory:\n\n```markdown\n# Architecture Concepts\n\n| Title | Description | Tags | Status |\n|-------|-------------|------|--------|\n| [SpacetimeDB Tenant Model](./tenant-model.md) | Multi-tenant data isolation | [backend, spacetime-db] | active |\n| [Provider Hierarchy](./provider-hierarchy.md) | LLM provider abstraction | [llm, providers] | active |\n```\n\nEach row includes: title (as a link to the concept file), description, tags, and status. This allows agents to scan the index and decide which concepts to read without opening every file.\n\n## Inbox Index\n\nThe inbox index has a slightly different format to reflect inbox-specific fields:\n\n```markdown\n# Inbox\n\nSession syntheses awaiting curation.\n\n| Title | Timestamp | Tags | Issues |\n|-------|-----------|------|--------|\n```\n\n## Count Accuracy\n\nCounts in index files must match the actual number of concept files in each directory (excluding `index.md` itself). The [verification process](../process/verify-deployment.md) checks this by counting `.md` files per directory and comparing to the index.\n\n## When Indexes Are Updated\n\nIndexes must be updated whenever concepts are:\n- **Added:** New row in the subdirectory index, incremented count in the root index.\n- **Updated:** Description or tags may change; update the row.\n- **Removed/moved:** Remove the row, decrement the count. If moved to `deprecation/`, add a row in the deprecation index.\n- **Renamed:** Update the link path in the index.\n\nThe curation agent is responsible for keeping indexes current. See [Curation Pass](../process/curation-pass.md).\n\n## Log File (`knowledge/log.md`)\n\nThe log records knowledge updates in reverse chronological order:\n\n```markdown\n# Knowledge Update Log\n\n## 2026-06-29T14:00:00Z - Curation Cycle\n\n- **Added:** `architecture/tenant-model.md`\n- **Updated:** `state/current-state.md`\n- **Deprecated:** `deprecation/old-routing-engine.md`\n- **Processed inbox:** 3 items\n```\n\nThe log tracks bundle-level evolution. Git history provides file-level diff tracking.\n"},{"filepath":"domain/link-resolution.md","content":"---\ntype: Domain\ntitle: Link Resolution in OKF\ndescription: How relative markdown links between concepts are resolved to concept IDs in the viewer\nresource: ./templates/okf/viewer.html\ntags: [okf, links, res
