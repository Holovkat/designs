<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=workflow-guide/" />
    <title>Designs Workflow Guide</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0c0b0a;
        --ink: #f6f0e8;
        --muted: #b8ad9f;
        --accent: #ff6422;
        --line: rgba(255, 255, 255, 0.18);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fffdf8;
          --ink: #211a15;
          --muted: #6f6258;
          --line: rgba(33, 26, 21, 0.18);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 40px));
        padding-block: 48px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 8vw, 78px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 56ch;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: clamp(16px, 2vw, 19px);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        margin-top: 32px;
        padding-bottom: 5px;
        border-bottom: 2px solid var(--accent);
        color: var(--ink);
        font-weight: 850;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        color: var(--accent);
      }
    </style>
    <script>
      window.location.replace("workflow-guide/");
    </script>
  </head>
  <body>
    <main>
      <p class="eyebrow">Designs</p>
      <h1>Project Delivery Workflow</h1>
      <p>
        Redirecting to the rendered workflow guide. If the redirect does not
        start automatically, open the guide directly.
      </p>
      <a href="workflow-guide/">Open workflow guide</a>
    </main>
  </body>
</html>
