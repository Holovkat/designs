otection Middleware\n`requireAuth` middleware verifies access token and gets user. Applied to protected routes.\n\n## Frontend Implementation\n\n- Login button redirects to backend login endpoint\n- `getCurrentUser` fetches user with credentials included\n- Logout calls backend logout endpoint\n\n## SSO Connection Types\n\n- **Magic Link** (Passwordless): Enable in dashboard, configure email settings\n- **Google OAuth**: Enable, add Google OAuth credentials\n- **SAML SSO** (Enterprise): Create organization, add SAML connection, provide connection details\n\n## Session Management\n\n### Express Session\n- `express-session` with secure, httpOnly cookies\n- 24-hour max age\n- `secure: process.env.NODE_ENV === 'production'`\n\n### JWT Tokens\n- `jsonwebtoken` for stateless sessions\n- httpOnly cookie for token storage\n\n## Advanced Features\n\n### Multi-Tenant Support\nPass `organization` ID for specific tenant in authorization URL.\n\n### Role-Based Access Control (RBAC)\nCheck user roles from WorkOS. `requireRole` middleware for role-protected routes.\n\n### Webhooks for User Events\nHandle `user.created`, `user.deleted` events via WorkOS webhooks.\n\n## Security Best Practices\n\n1. Always use HTTPS in production\n2. Store API keys securely, never commit to version control\n3. Validate redirect URIs (whitelist allowed callbacks)\n4. Use httpOnly cookies for session tokens\n5. Implement CSRF protection for state parameters\n6. Set appropriate session timeouts\n7. Validate tokens on every request to protected routes\n\n## Production Checklist\n\n- Move from test to production API keys\n- Update redirect URIs to production URLs\n- Enable HTTPS\n- Set up proper session management\n- Configure webhook endpoints\n- Set up monitoring and error tracking\n- Test all SSO providers\n\n## Related Concepts\n\n- [Convex Self-Hosted Setup](./convex-self-hosted.md)\n- [Stripe Payment Integration](./stripe-payment-integration.md)\n- [Deployment Guide](./deployment-guide.md)\n"},{"filepath":"state/current-state.md","content":"---\ntype: State\ntitle: OKF System Current State\ndescription: Current state of the OKF system as of v0.1 including all components and deployments\nresource: ./templates/okf/\ntags: [okf, state, status, v0.1]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF System Current State\n\n## Version\n\nOKF Standard v0.1. The standard is defined in `OKF-STANDARD.md` and deployed via the `DEPLOYMENT-RUNBOOK.md`.\n\n## What Works\n\n### Core Standard\n- OKF Standard v0.1 specification is complete: directory structure, concept types, frontmatter schema, inbox format, index format, log format, curation rules, legacy alignment mode, agent onboarding.\n- 8 concept types defined: Architecture, Component, Domain, Decision, Process, Deprecation, State, Inbox.\n\n### Tooling\n- **install-okf.sh:** Installer script that creates the knowledge directory structure, copies viewer and generator, installs the post-commit hook to `.githooks/`, sets local `core.hooksPath`, and appends the OKF section to AGENTS.md.\n- **post-commit.sh:** Lightweight commit metadata capture hook that writes to `knowledge/inbox/`. Handles edge cases (no knowledge dir, gitignored, duplicates).\n- **generate-viz.js:** Node.js script that reads all `.md` concept files and embeds them as JSON into `viewer.html` to produce a self-contained `viz.html`.\n- **viewer.html:** Single-file HTML viewer with two tabs (Browse with folder tree + detail, Graph with Cytoscape.js), mermaid.js rendering, link interception, search filtering, and drag-and-drop folder loading.\n- **okf.ts:** Pi extension providing `/okf-status`, `/okf-query`, `/okf-capture`, `/okf-curate`, and `/okf-init` commands.\n- **SKILL.md:** Agent skill definition for working with OKF bundles, including onboarding, inbox writing, and curation instructions.\n- **okf-curator droid:** Dedicated curation agent that processes inbox items into permanent concept files, fetching GitHub issues for context.\n\n### Documentation\n- **OKF-STANDARD.md:** The complete standard specification.\n- **DEPLOYMENT-RUNBOOK.md:** 8-phase deployment workflow.\n- **AGENTS-OKF-SECTION.md:** Template for the AGENTS.md OKF section.\n- **Template index files:** Templates for root index, subdirectory indexes, log, and inbox index.\n\n### Deployments\n- **fms-glm:** OKF deployed with 144 concepts. This is the primary production deployment.\n- **designs/ (this bundle):** OKF system's own self-knowledge bundle, documenting how OKF works and how to deploy it.\n\n## What Is In Progress\n\n- Broader adoption across additional projects.\n- Refinement of curation workflows based on usage feedback.\n- Potential enhancements to the viewer (additional graph layouts, export features).\n\n## What Is Blocked\n\n- Nothing currently blocked.\n\n## Component Status Summary\n\n| Component | Status | Location |\n|-----------|--------|----------|\n| OKF Standard v0.1 | Complete | `templates/okf/OKF-STANDARD.md` |\n| Deployment Runbook | Complete | `templates/okf/DEPLOYMENT-RUNBOOK.md` |\n| Installer | Complete | `templates/okf/install-okf.sh` |\n| Post-commit Hook | Complete | `templates/okf/post-commit.sh` |\n| Viz Generator | Complete | `templates/okf/generate-viz.js` |\n| Viewer | Complete | `templates/okf/viewer.html` |\n| Pi Extension | Complete | `pi-extensions/extensions/okf.ts` |\n| Agent Skill | Complete | `pi-extensions/skills/okf/SKILL.md` |\n| Curator Droid | Complete | `pi-extensions/.factory/droids/okf-curator.md` |\n| AGENTS Section Template | Complete | `templates/okf/AGENTS-OKF-SECTION.md` |\n| fms-glm deployment | Deployed (144 concepts) | `fms-glm/knowledge/` |\n| Self-knowledge bundle | Deployed (this bundle) | `designs/knowledge/` |\n\n## Key Decisions\n\n- [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md): Existing docs stay in place; OKF concepts reference them.\n- [Post-Commit Capture Model](../decisions/post-commit-capture-model.md): Lightweight hook writes to inbox; curation is separate.\n- [Per-Project Bundles](../decisions/per-project-bundles.md): Each project has its own knowledge/ directory in git.\n"},{"filepath":"state/designs-project-state.md","content":"---\ntype: State\ntitle: Designs Project Content State\ndescription: Current state of the designs project's own content including templates, guides, UI/UX patterns, and infrastructure docs\nresource: ./README.md\ntags: [designs, state, content, templates, guides, ui-ux, infrastructure]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Designs Project Content State\n\n## Overview\n\nThe designs repository is a documentation-first collection of reusable project-design templates, agent workflow commands, project-local skills, and delivery operating model guidance. This concept documents the state of the project's own content (separate from the OKF system state).\n\n## What Exists\n\n### README and Top-Level\n- README.md with project overview, planning decomposition mermaid diagram, delivery lifecycle mermaid diagram, and repository structure\n- AGENTS.md with OKF knowledge bundle instructions\n- GitHub Pages site at `https://holovkat.github.io/designs/`\n\n### Workflow Guide (docs/workflow-guide/)\n- `index.html` - 1039-line HTML operating model covering overview, installation, commands, intent confidence, planning intake, planning decomposition, approval gates, and more\n- `install.html` - Installation instructions page\n- `assets/workflow.css` and `assets/workflow.js` - Supporting assets\n- `docs/superpowers/` - Plans and specs subdirectories (minimal content)\n\n### Templates Area\n- **AGENTS.md** - Templates area agent instructions with DESIGN.md authoring guidance and Graphite stacking workflow\n- **DESIGN.template.md** - Starter template for spec-compliant DESIGN.md files\n- **Frontend-Technical-Functional-Requirements-Document-TFD.md** - TFD template and standards\n- **index.md** - Templates index\n\n### Instructional Documents (templates/instructional-documents/)\n- Live implementation status for designs repo (Codex planning + builder agent packs)\n- **00-TEMPLATE-IMPLEMENTATION-CHECKLIST.md** - Archived template baseline\n- **01-ARCHITECTURE-OVERVIEW.md** through **10-CI-CD-PIPELINE.md** - Phased setup templates\n- **98-TESTING-AND-VERIFICATION.md** and **99-DEPLOYMENT-STRATEGY.md** - Post-release templates\n\n### UI/UX Guidelines (templates/ui-ux-guidelines/)\n- **README.md** - Overview with minimalist/borderless design philosophy (Notional-inspired)\n- **design-tokens.md** - OKLCH color system, \"Solar Dusk\" palette, Tailwind v4 integration\n- **design-tokens.json** - Machine-readable tokens for Figma/Style Dictionary\n- **component-patterns.md** - 412 lines of component conventions\n- **form-patterns.md** - 584 lines of form field, validation, and wizard patterns\n- **data-display-patterns.md** - 978 lines of table, card, list, and Kanban patterns\n- **interactive-patterns.md** - 1047 lines of drag-drop, modal, and interaction patterns\n- **layout-patterns.md** - 657 lines of page layout, sidebar, and responsive patterns\n\n### Design Standard (design-standard-v01/)\n- Cloned DESIGN.md standard repository (version alpha)\n- **README.md** - Format overview, CLI reference, linting rules\n- **docs/spec.md** - Full format specification (356 lines)\n- **examples/** - Example DESIGN.md files (e.g., atmospheric-glass)\n- **packages/** - CLI packages (@google/design.md)\n\n### Other Directories\n- **coder-pro/** - Features and instructions subdirectories\n- **codex-pro/** - Functional design and instructional documents subdirectories\n- **fms/** - FMS project snapshots with requirements, functional design, and instructional documents\n\n## What Is In Progress\n\n- Codex Global Planning Agent Pack (Sprint 1) - 11 issues tracked in implementation checklist\n- Codex Builder Agent Pack (Sprint 2) - 9 issues tracked in implementation checklist\n- OKF system adoption and refinement\n\n## What Is Blocked\n\n- Nothing currently blocked for the designs project content.\n\n## Component Status Summary\n\n| Component | Status | Location |\n|-----------|--------|----------|\n| README | Complete | `README.md` |\n| Workflow Guide (HTML) | Complete | `docs/workflow-guide/index.html` |\n| GitHub Workflow Guide | Complete | `templates/instructional-documents/github-workflow.md` |\n| Deployment Guide | Complete | `templates/instructional-documents/deployment-guide.md` |\n| Architecture Guide | Complete | `templates/instructional-documents/architecture.md` |\n| Stripe Integration Guide | Complete | `templates/instructional-documents/stripe-payment-gateway.md` |\n| WorkOS Auth Guide | Complete | `templates/instructional-documents/work-os-auth.md` |\n| Tailwind Guide | Complete | `templates/instructional-documents/tailwind.md` |\n| UX Design Standards | Complete | `templates/instructional-documents/ux_design_standards.md` |\n| Convex Self-Hosted Docs | Complete | `templates/instructional-documents/convex-self-hosted-*.md` |\n| Planning Agent Contracts | Complete | `templates/instructional-documents/codex-global-planning-agents.md` |\n| Builder Agent Contracts | Complete | `templates/instructional-documents/codex-global-builder-agents.md` |\n| Agent Generation Guides | Complete | `templates/instructional-documents/generate-*.md` |\n| UI/UX Guidelines | Complete | `templates/ui-ux-guidelines/` (7 files) |\n| Design Standard | Complete (alpha) | `design-standard-v01/` |\n| Session Workflows Installer | Complete | `templates/instructional-documents/install-session-workflows.sh` |\n| Functional Design Templates | Complete | `templates/functional-design/` (14 files) |\n| Slash Commands | Complete | `templates/instructional-documents/commands/` (18 files) |\n| Project Skills | Complete | `templates/instructional-documents/skills/` (5 skills) |\n| Git Hooks | Complete | `templates/instructional-documents/hooks/` (8 hooks) |\n| Session Scripts | Complete | `templates/instructional-documents/scripts/` (9 scripts) |\n| Codex Planning Agent Pack | In Progress | `~/.codex/agents/` (Sprint 1) |\n| Codex Builder Agent Pack | In Progress | `~/.codex/agents/` (Sprint 2) |\n\n## Key Decisions\n\n- [Documentation-First Approach](../decisions/documentation-first-approach.md): README is GitHub index, HTML guide is canonical operating model\n- [Graphite Stacking for Docs](../decisions/graphite-stacking-for-docs.md): Use stacking workflow for dependent documentation changes\n\n## Related Concepts\n\n- [OKF System Current State](./current-state.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n- [DESIGN.md Standard Specification](../architecture/design-standard-spec.md)\n- [Planning Decomposition](../process/planning-decomposition.md)\n- [Delivery Lifecycle](../process/delivery-lifecycle.md)\n- [Documentation-First Approach](../decisions/documentation-first-approach.md)\n"}];
let currentView = 'browse';

function parseFrontmatter(content) {
  const match = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { frontmatter: {}, body: content };
  const yaml = match[1], body = match[2], fm = {};
  for (const line of yaml.split('\n')) {
    const m = line.match(/^(\w+):\s*(.*)$/);
    if (!m) continue;
    const key = m[1]; let value = m[2].trim();
    if (value.startsWith('[') && value.endsWith(']')) {
      const inner = value.slice(1, -1).trim();
      fm[key] = inner ? inner.split(',').map(s => s.trim().replace(/^["']|["']$/g, '')) : [];
    } else { fm[key] = value.replace(/^["']|["']$/g, ''); }
  }
  return { frontmatter: fm, body };
}

function extractLinks(body, basePath) {
  const links = [];
  const regex = /\[([^\]]+)\]\(([^)]+\.md)\)/g;
  let match;
  while ((match = regex.exec(body)) !== null) {
    let target = match[2];
    if (target.startsWith('http')) continue;
    const baseDir = basePath.includes('/') ? basePath.split('/').slice(0, -1).join('/') : '';
    if (target.startsWith('./')) target = target.slice(2);
    if (target.startsWith('../')) {
      const parts = (baseDir ? baseDir.split('/') : []).concat(target.split('/'));
      const resolved = [];
      for (const p of parts) { if (p === '..') resolved.pop(); else if (p !== '.' && p !== '') resolved.push(p); }
      target = resolved.join('/');
    } else if (baseDir) { target = baseDir + '/' + target; }
    links.push({ label: match[1], target });
  }
  return links;
}

function slugToId(fp) { return fp.replace(/\.md$/, ''); }

function getConceptType(fp, fm) {
  if (fm.type) return fm.type;
  for (const d of DIR_ORDER) { if (fp.includes(d + '/')) return d.charAt(0).toUpperCase() + d.slice(1); }
  return 'unknown';
}

function buildConcept(item) {
  const { frontmatter, body } = parseFrontmatter(item.content);
  const type = getConceptType(item.filepath, frontmatter);
  const id = slugToId(item.filepath);
  const links = extractLinks(body, item.filepath);
  return {
    id, filepath: item.filepath, filename: item.filepath.split('/').pop(),
    frontmatter, body, type, links, backlinks: [],
    title: frontmatter.title || item.filepath.replace(/\.md$/, '').replace(/-/g, ' '),
    description: frontmatter.description || '',
    tags: Array.isArray(frontmatter.tags) ? frontmatter.tags : [],
    status: frontmatter.status || 'active',
    resource: frontmatter.resource || '',
    issueRefs: Array.isArray(frontmatter.issue_refs) ? frontmatter.issue_refs : [],
  };
}

function processConcepts(items) {
  allConcepts = items.map(buildConcept);
  const conceptIds = new Set(allConcepts.map(c => c.id));
  allLinks = [];
  const backlinks = new Map();
  for (const c of allConcepts) {
    for (const link of c.links) {
      const tid = slugToId(link.target);
      if (conceptIds.has(tid)) {
        allLinks.push({ source: c.id, target: tid });
        if (!backlinks.has(tid)) backlinks.set(tid, []);
        backlinks.get(tid).push(c.id);
      }
    }
  }
  for (const c of allConcepts) c.backlinks = backlinks.get(c.id) || [];
}

async function readDirectory(dirHandle, prefix = '') {
  const results = [];
  for await (const [name, handle] of dirHandle.entries()) {
    if (name === 'index.md' || name === 'log.md' || name.startsWith('.') || name.endsWith('.html') || name.endsWith('.js')) continue;
    const p = prefix ? prefix + '/' + name : name;
    if (handle.kind === 'directory') { results.push(...await readDirectory(handle, p)); }
    else if (name.endsWith('.md')) { results.push({ filepath: p, content: await (await handle.getFile()).text() }); }
  }
  return results;
}

async function loadFolder(dirHandle) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('folder-btn').disabled = true;
  try {
    const items = await readDirectory(dirHandle);
    processConcepts(items);
    onDataLoaded();
  } catch (err) { alert('Error: ' + err.message); }
  finally { document.getElementById('loading').style.display = 'none'; }
}

function onDataLoaded() {
  renderTree();
  renderGraph();
  renderFilters();
  document.getElementById('stats').textContent = `${allConcepts.length} concepts | ${allLinks.length} links`;
  document.getElementById('folder-btn').textContent = allConcepts.length + ' loaded';
  document.getElementById('folder-btn').disabled = true;
}

/* ---- Folder Tree ---- */
function renderTree() {
  const tree = document.getElementById('tree');
  tree.innerHTML = '';
  const grouped = {};
  for (const c of allConcepts) {
    const dir = c.filepath.includes('/') ? c.filepath.split('/')[0] : 'root';
    if (!grouped[dir]) grouped[dir] = [];
    grouped[dir].push(c);
  }
  const search = document.getElementById('search').value.toLowerCase();
  for (const dir of DIR_ORDER) {
    const concepts = (grouped[dir] || []).filter(c => {
      if (!search) return true;
      return c.title.toLowerCase().includes(search) || c.id.toLowerCase().includes(search) ||
        c.tags.some(t => t.toLowerCase().includes(search)) || (c.description && c.description.toLowerCase().includes(search));
    });
    if (concepts.length === 0) continue;
    const typeLabel = dir.charAt(0).toUpperCase() + dir.slice(1);
    const color = TYPE_COLORS[typeLabel] || '#8b949e';

    const dirEl = document.createElement('div');
    dirEl.className = 'tree-dir';
    dirEl.innerHTML = `<span class="arrow">▼</span><span class="dir-dot" style="background:${color}"></span>${typeLabel}<span class="dir-count">${concepts.length}</span>`;
    dirEl.onclick = () => {
      dirEl.classList.toggle('collapsed');
      filesEl.classList.toggle('collapsed');
    };

    const filesEl = document.createElement('div');
    filesEl.className = 'tree-files';
    for (const c of concepts.sort((a, b) => a.title.localeCompare(b.title))) {
      const fEl = document.createElement('div');
      fEl.className = 'tree-file';
      fEl.dataset.id = c.id;
      fEl.textContent = c.title;
      if (c.status === 'deprecated') fEl.innerHTML += '<span class="file-status">○</span>';
      fEl.onclick = () => {
        document.querySelectorAll('.tree-file').forEach(e => e.classList.remove('active'));
        fEl.classList.add('active');
        showDetail(c, 'detail');
      };
      filesEl.appendChild(fEl);
    }
    tree.appendChild(dirEl);
    tree.appendChild(filesEl);
  }
}

/* ---- Detail Panel ---- */
function showDetail(concept, targetId) {
  const el = document.getElementById(targetId);
  const fm = concept.frontmatter;
  const fmLines = [];
  if (fm.resource) fmLines.push(`<div>resource: <a href="${fm.resource}" target="_blank">${fm.resource}</a></div>`);
  if (fm.timestamp) fmLines.push(`<div>timestamp: ${fm.timestamp}</div>`);
  if (concept.issueRefs.length) fmLines.push(`<div>issue_refs: [${concept.issueRefs.join(', ')}]</div>`);
  if (fm.supersedes && Array.isArray(fm.supersedes) && fm.supersedes.length) fmLines.push(`<div>supersedes: [${fm.supersedes.join(', ')}]</div>`);

  const badges = [`<span class="badge type" data-type="${concept.type}">${concept.type}</span>`];
  if (concept.status && concept.status !== 'active')
    badges.push(`<span class="badge status ${concept.status === 'deprecated' ? 'deprecated' : ''}">${concept.status}</span>`);
  if (concept.tags.length) badges.push(...concept.tags.map(t => `<span class="badge">${t}</span>`));

  const backlinkHtml = concept.backlinks.length ? `
    <div class="backlinks"><h3>Cited by (${concept.backlinks.length})</h3>
    ${concept.backlinks.map(id => { const c = allConcepts.find(x => x.id === id); return c ? `<a data-id="${id}">${c.title}</a>` : ''; }).join('')}
    </div>` : '';

  el.innerHTML = `<div class="content">
    <h2>${concept.title}</h2>
    <div class="meta">${badges.join('')}</div>
    ${fmLines.length ? `<div class="frontmatter">${fmLines.join('')}</div>` : ''}
    <div class="body">${marked.parse(concept.body)}</div>
    ${backlinkHtml}
  </div>`;

  // Attach backlink click handlers first (before mermaid, which can throw)
  el.querySelectorAll('.backlinks a').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const c = allConcepts.find(x => x.id === a.dataset.id);
      if (c) { showDetail(c, targetId); if (cy) cy.getElementById(c.id).select(); }
    };
  });

  // Intercept relative .md links in body and frontmatter
  el.querySelectorAll('.body a[href], .frontmatter a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#')) return;
    a.onclick = (e) => {
      e.preventDefault();
      // Resolve relative path from current concept's directory
      const baseDir = concept.id.includes('/') ? concept.id.substring(0, concept.id.lastIndexOf('/') + 1) : '';
      let resolved = baseDir + href;
      // Normalise path segments
      while (resolved.includes('../')) {
        resolved = resolved.replace(/[^/]+\/\.\.\//, '');
      }
      resolved = resolved.replace(/\/\.\//g, '/');
      resolved = resolved.replace(/^\.\//, '');
      // Strip .md extension to match concept IDs
      resolved = resolved.replace(/\.md$/, '');
      const target = allConcepts.find(x => x.id === resolved);
      if (target) {
        showDetail(target, targetId);
        if (cy) cy.getElementById(target.id).select();
      }
    };
  });

  // Render mermaid diagrams (wrapped in try-catch so errors don't break navigation)
  try {
    el.querySelectorAll('pre code').forEach((codeEl, i) => {
      const text = codeEl.textContent.trim();
      if (text.startsWith('erDiagram') || text.startsWith('flowchart') || text.startsWith('graph') || text.startsWith('sequenceDiagram')) {
        const pre = codeEl.parentElement;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.id = 'mermaid-' + Date.now() + '-' + i;
        div.textContent = text;
        pre.replaceWith(div);
      }
    });
    const mermaidNodes = el.querySelectorAll('.mermaid');
    if (mermaidNodes.length > 0 && typeof mermaid !== 'undefined') {
      mermaid.run({ nodes: mermaidNodes }).catch(() => {});
    }
  } catch (e) { /* mermaid not loaded or render error - ignore */ }

  el.scrollTop = 0;
}

/* ---- Graph ---- */
function renderGraph() {
  const nodes = allConcepts.map(c => ({ data: { id: c.id, label: c.title.length > 28 ? c.title.slice(0, 26) + '..' : c.title, type: c.type, color: TYPE_COLORS[c.type] || '#8b949e', concept: c } }));
  const edges = allLinks.map((l, i) => ({ data: { id: 'e' + i, source: l.source, target: l.target } }));
  if (cy) cy.destroy();
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: [...nodes, ...edges],
    style: [
      { selector: 'node', style: { 'background-color': 'data(color)', 'label': 'data(label)', 'color': '#c9d1d9', 'font-size': '10px', 'text-valign': 'bottom', 'text-halign': 'center', 'text-margin-y': 4, 'width': 22, 'height': 22, 'border-width': 2, 'border-color': '#21262d', 'text-wrap': 'ellipsis', 'text-max-width': '120px' }},
      { selector: 'node:selected', style: { 'border-width': 3, 'border-color': '#f0f6fc', 'width': 28, 'height': 28 }},
      { selector: 'edge', style: { 'width': 1, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.6 }},
      { selector: '.deprecated', style: { 'border-style': 'dashed', 'opacity': 0.5 }}
    ],
    layout: { name: 'cose', animate: true, padding: 40, idealEdgeLength: 80, nodeRepulsion: 8000 }
  });
  cy.nodes().forEach(n => { if (n.data('concept').status === 'deprecated') n.addClass('deprecated'); });
  cy.on('tap', 'node', evt => showDetail(evt.target.data('concept'), 'graph-detail'));
}

function renderFilters() {
  const tb = document.getElementById('toolbar');
  document.querySelectorAll('.filter-btn').forEach(e => e.remove());
  for (const type of [...new Set(allConcepts.map(c => c.type))].sort()) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn active'; btn.dataset.type = type; btn.textContent = type;
    btn.onclick = () => {
      if (activeFilters.has(type)) { activeFilters.delete(type); btn.classList.remove('active'); }
      else { activeFilters.add(type); btn.classList.add('active'); }
      applyFilters();
    };
    tb.insertBefore(btn, document.getElementById('search'));
  }
}

function applyFilters() {
  if (currentView !== 'graph' || !cy) return;
  const s = document.getElementById('search').value.toLowerCase();
  cy.nodes().forEach(n => {
    const c = n.data('concept');
    const tm = activeFilters.size === 0 || activeFilters.has(c.type);
    const sm = !s || c.title.toLowerCase().includes(s) || c.id.toLowerCase().includes(s) || c.tags.some(t => t.toLowerCase().includes(s));
    n.style('display', (tm && sm) ? 'element' : 'none');
  });
  cy.edges().forEach(e => {
    e.style('display', (cy.getElementById(e.data('source')).style('display') !== 'none' && cy.getElementById(e.data('target')).style('display') !== 'none') ? 'element' : 'none');
  });
}

/* ---- Navigation ---- */
function switchView(view) {
  currentView = view;
  document.getElementById('nav-browse').classList.toggle('active', view === 'browse');
  document.getElementById('nav-graph').classList.toggle('active', view === 'graph');
  document.getElementById('browse-view').classList.toggle('active', view === 'browse');
  document.getElementById('graph-view').classList.toggle('active', view === 'graph');
  if (view === 'graph' && cy) cy.resize();
  if (view === 'browse') renderTree();
}
document.getElementById('nav-browse').onclick = () => switchView('browse');
document.getElementById('nav-graph').onclick = () => switchView('graph');

/* ---- Search ---- */
document.getElementById('search').oninput = () => {
  if (currentView === 'browse') renderTree();
  else applyFilters();
};

/* ---- Folder picker ---- */
document.getElementById('folder-btn').onclick = async () => {
  try { await loadFolder(await window.showDirectoryPicker()); }
  catch (err) { if (err.name !== 'AbortError') alert('Error: ' + err.message); }
};

/* ---- Auto-load embedded data ---- */
function loadEmbeddedData() {
  if (typeof __OKF_DATA__ !== 'undefined' && __OKF_DATA__ && Array.isArray(__OKF_DATA__)) {
    processConcepts(__OKF_DATA__.map(item => ({ filepath: item.filepath, content: item.content })));
    onDataLoaded();
  }
}
loadEmbeddedData();

/* ---- Drag and drop ---- */
let dragCounter = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; document.getElementById('drop-zone').style.display = 'flex'; });
window.addEventListener('dragleave', (e) => { e.preventDefault(); dragCounter--; if (dragCounter === 0) document.getElementById('drop-zone').style.display = 'none'; });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', async (e) => {
  e.preventDefault(); dragCounter = 0;
  document.getElementById('drop-zone').style.display = 'none';
  const items = e.dataTransfer.items;
  if (items && items.length > 0 && items[0].webkitGetAsEntry) {
    const entry = items[0].webkitGetAsEntry();
    if (entry.isDirectory) {
      try { const handle = await entry.getFilesystemHandle?.(); if (handle) await loadFolder(handle); } catch {}
    }
  }
});
</script>
</body>
