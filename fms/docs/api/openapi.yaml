openapi: 3.0.3
info:
  title: FMS API (Launch, Minimal)
  version: 0.1.0
  description: |
    Minimal OpenAPI covering high-value endpoints: ERP inbound webhook, reports exports,
    and admin config registry/changesets. Schemas reference existing JSON Schemas in docs/.
servers:
  - url: https://api.example.com
    description: Placeholder base URL
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    hmacSignature:
      type: apiKey
      in: header
      name: X-Signature
      description: sha256=hex(HMAC_SHA256(secret, `${timestamp}.${rawBody}`))
  parameters:
    XTimestamp:
      name: X-Timestamp
      in: header
      description: UNIX epoch seconds used in HMAC signature
      required: true
      schema:
        type: string
    TenantIdPath:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
      description: Tenant identifier for webhook scoping
  schemas:
    OrderIngestBatch:
      $ref: ../integrations/schemas/order-ingest.schema.json
    OrderIngestResponse:
      $ref: ../integrations/schemas/order-ingest-response.schema.json
    OutboundEvent:
      $ref: ../integrations/schemas/outbound-event.schema.json
    ConfigRegistry:
      type: object
      properties:
        groups:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              title: { type: string }
              scopeTypes:
                type: array
                items: { type: string }
              schemaRef: { type: string }
              version: { type: string }
            required: [id, title, scopeTypes, schemaRef]
    ChangesetCreate:
      type: object
      properties:
        scope:
          type: object
          properties:
            scope_type: { type: string, enum: [tenant, mode, zone, mode_zone] }
            mode: { type: string, nullable: true }
            zone_id: { type: string, nullable: true }
          required: [scope_type]
        group: { type: string }
        values: { type: object }
      required: [scope, group, values]
paths:
  /webhook/erp/{tenant_id}/orders:
    post:
      summary: Batched ERP order ingestion (HMAC)
      security:
        - hmacSignature: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/XTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderIngestBatch'
      responses:
        '200':
          description: OK (accepted and/or partial)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderIngestResponse'
        '400': { description: Bad Request }
        '401': { description: Unauthorized (HMAC invalid) }
        '413': { description: Payload too large }
        '429': { description: Rate limited }
        '500': { description: Server error }
  /api/v1/reports/schedules.pdf:
    get:
      summary: Export schedules (PDF)
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: zoneId
          in: query
          schema: { type: string }
        - name: vehicleGroup
          in: query
          schema: { type: string }
        - name: pageSize
          in: query
          schema: { type: string, enum: [A4, Letter] }
        - name: orientation
          in: query
          schema: { type: string, enum: [portrait, landscape] }
      responses:
        '200':
          description: PDF content
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400': { description: Bad Request }
        '401': { description: Unauthorized }
  /api/v1/reports/schedules.xlsx:
    get:
      summary: Export schedules (Excel)
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: zoneId
          in: query
          schema: { type: string }
        - name: vehicleGroup
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Excel content
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
  /api/v1/reports/kpi.png:
    get:
      summary: Export KPI widget (PNG)
      security:
        - bearerAuth: []
      parameters:
        - name: metric
          in: query
          schema: { type: string, enum: [on_time, active_vehicles, eta_variance, pending_tasks] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: timezone
          in: query
          schema: { type: string }
      responses:
        '200':
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
  /api/v1/reports/kpi.csv:
    get:
      summary: Export KPI series (CSV)
      security:
        - bearerAuth: []
      parameters:
        - name: metric
          in: query
          schema: { type: string, enum: [on_time, active_vehicles, eta_variance, pending_tasks] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: timezone
          in: query
          schema: { type: string }
      responses:
        '200':
          description: CSV content
          content:
            text/csv:
              schema:
                type: string
  /api/v1/config/registry:
    get:
      summary: List available setting groups and schemas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRegistry'
  /api/v1/config/changesets:
    post:
      summary: Create changeset draft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangesetCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  changeset_id: { type: string }
                  status: { type: string }
                  created_at: { type: string, format: date-time }
  /api/v1/config/changesets/{id}/validate:
    post:
      summary: Validate a draft changeset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  errors: { type: array, items: { type: object } }
                  warnings: { type: array, items: { type: object } }
  /api/v1/config/changesets/{id}/approve:
    post:
      summary: Approve a changeset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        '200': { description: Approved }
  /api/v1/config/changesets/{id}/apply:
    post:
      summary: Apply a changeset
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  applied_at: { type: string, format: date-time }
  /api/v1/billing/summary:
    get:
      summary: Billing summary for the current tenant
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
          application/json:
            schema:
              type: object
              properties:
                plan: { type: string }
                cadence: { type: string, enum: [monthly, yearly] }
                included_loads: { type: integer, example: 1000 }
                used_loads: { type: integer }
                remaining_loads: { type: integer }
                renewal_at: { type: string, format: date-time }
                payg_unit_price_aud: { type: number, example: 1.0 }
  /api/v1/billing/topups:
    post:
      summary: Purchase a top-up pack
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pack_id: { type: string, enum: [pack_1k_10, pack_5k_15] }
      responses:
        '201':
          description: Checkout created
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkout_url: { type: string }
  /api/v1/billing/packs:
    get:
      summary: List available top-up packs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, example: pack_1k_10 }
                        title: { type: string, example: Top‑Up 1,000 Loads (10% off) }
                        loads: { type: integer, example: 1000 }
                        discount_pct: { type: number, example: 10 }
  /api/v1/billing/invoices:
    get:
      summary: List invoices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        status: { type: string }
                        amount_due: { type: integer }
                        currency: { type: string }
                        hosted_invoice_url: { type: string }
                        created: { type: string, format: date-time }
security:
  - bearerAuth: []
