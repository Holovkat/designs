olution, viewer, navigation]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Link Resolution in OKF\n\nConcepts link to each other using relative markdown paths (e.g., `../architecture/viewer-architecture.md`). The OKF viewer intercepts clicks on these links and resolves them to concept IDs for in-viewer navigation.\n\n## How Links Are Written\n\nIn a concept body, links use standard markdown syntax with relative paths:\n\n```markdown\nSee [Viewer Architecture](../architecture/viewer-architecture.md) for details.\nThe [Hook System](./hook-system.md) captures commit metadata.\n```\n\nLinks are relative to the concept file's directory, just like normal markdown file links.\n\n## Concept IDs\n\nA concept ID is the file path relative to the `knowledge/` root with the `.md` extension stripped. For example:\n\n| File Path | Concept ID |\n|-----------|------------|\n| `architecture/viewer-architecture.md` | `architecture/viewer-architecture` |\n| `domain/concept-types.md` | `domain/concept-types` |\n| `decisions/legacy-alignment-mode.md` | `decisions/legacy-alignment-mode` |\n\n## Viewer Link Interception\n\nWhen a user clicks a `.md` link in a concept body or frontmatter, the viewer's click handler executes this resolution algorithm:\n\n1. **Skip external links:** If the href starts with `http` or `#`, let the browser handle it normally.\n2. **Determine base directory:** Take the current concept's ID and extract everything up to and including the last `/`. For example, if the current concept is `domain/concept-types`, the base directory is `domain/`.\n3. **Prepend base:** Combine the base directory with the href. For example, `../architecture/viewer-architecture.md` from `domain/concept-types` becomes `domain/../architecture/viewer-architecture.md`.\n4. **Normalise `../`:** Repeatedly replace `[^/]+/\\.\\./` (a directory name followed by `../`) with nothing. This resolves parent directory references. For example, `domain/../architecture/viewer-architecture.md` becomes `architecture/viewer-architecture.md`.\n5. **Remove `./`:** Replace `/./` with `/` and strip leading `./`.\n6. **Strip `.md`:** Remove the `.md` extension to produce the concept ID. For example, `architecture/viewer-architecture.md` becomes `architecture/viewer-architecture`.\n7. **Look up concept:** Find the concept with the matching ID in the loaded concepts array.\n8. **Display:** If found, show the target concept in the same detail panel and select its node in the graph view.\n\n## Link Extraction for Graph Edges\n\nThe viewer also extracts links during concept processing (not just on click). The `extractLinks` function scans the markdown body for `[text](path.md)` patterns, resolves the target path using the same normalisation logic, and creates graph edges. Links that resolve to non-existent concept IDs are silently dropped (no broken edges in the graph).\n\n## Backlinks\n\nAfter processing all concepts, the viewer computes backlinks: for each concept, which other concepts link to it. Backlinks are displayed in the detail panel as a \"Cited by\" section. Clicking a backlink navigates to the citing concept.\n\n## Best Practices\n\n- Use relative paths from the current concept's directory, consistent with standard markdown.\n- Always include the `.md` extension in link targets so they work in normal markdown renderers too.\n- Link to concepts that provide context for the current topic. Cross-linking enriches the knowledge graph.\n- Avoid linking to `index.md` files; link to specific concepts instead.\n- The curation agent adds cross-links during [curation passes](../process/curation-pass.md).\n"},{"filepath":"domain/ux-design-standards.md","content":"---\ntype: Domain\ntitle: UX Design Standards\ndescription: shadcn/ui with Tailwind v4 design system guidelines enforcing 4 font sizes, 2 weights, 8pt grid, and 60/30/10 color rule\nresource: ./templates/instructional-documents/ux_design_standards.md\ntags: [designs, ux, standards, shadcn, tailwind-v4, typography, grid-system, color-rule]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# UX Design Standards\n\n## Core Design Principles\n\n### 1. Typography System: 4 Sizes, 2 Weights\n\n- **4 Font Sizes Only**: Size 1 (large headings), Size 2 (subheadings), Size 3 (body), Size 4 (small text/labels)\n- **2 Font Weights Only**: Semibold (headings/emphasis), Regular (body/general)\n- Maintain clear visual hierarchy with limited options\n\n### 2. 8pt Grid System\n\n- All spacing values must be divisible by 8 or 4\n- Examples: 24px (not 25px), 12px (not 11px), 16px (not 15px)\n- Creates visual harmony and predictable patterns\n\n### 3. 60/30/10 Color Rule\n\n- **60%**: Neutral color (white/light gray) - backgrounds, cards, containers\n- **30%**: Complementary color (dark gray/black) - text, icons, subtle UI\n- **10%**: Accent color (brand color) - CTAs, highlights, important indicators\n- Prevents visual stress while maintaining hierarchy\n\n### 4. Clean Visual Structure\n\n- Logical grouping of related elements\n- Deliberate spacing following the grid system\n- Proper alignment within containers\n- Simplicity over flashiness\n\n## Tailwind v4 Integration\n\n- Replace `@layer base` with `@theme` directive\n- Use `@import \"tailwindcss\"` instead of `@tailwind base`\n- Container queries built-in without plugins\n- OKLCH color format for better color perception\n\n## Component Architecture\n\n- 2-layered: Radix UI primitives (structure/behavior) + Tailwind CSS (style)\n- Class Variance Authority (CVA) for variant styling\n- `data-slot` attribute for styling component parts\n- New-York style is the default recommended style\n\n## Installation\n\n```bash\nnpx create-next-app@latest my-app\ncd my-app\nnpx shadcn-ui@latest init\n```\n\nAdd components individually: `npx shadcn-ui@latest add button`\n\n## Advanced Features\n\n### Dark Mode\n- OKLCH colors for better accessibility\n- Custom variant: `@custom-variant dark (&:is(.dark *))`\n\n### Container Queries\n- Built-in support without plugins\n- `@min-*` and `@max-*` variants for ranges\n\n### Data Visualization\n- Chart components with chart-1 through chart-5 variables\n- Consistent color patterns\n\n## Code Review Checklist\n\n- Typography: only 4 font sizes and 2 font weights\n- Spacing: all values divisible by 8 or 4\n- Colors: follows 60/30/10 distribution\n- OKLCH color variables used properly\n- `@theme` directive for variables\n- `data-slot` attribute implemented\n- CVA for variants\n- Dark mode consistent\n- Accessibility standards maintained\n\n## Common Issues to Flag\n\n- Too many font sizes (more than 4)\n- Inconsistent spacing (not divisible by 8 or 4)\n- Overuse of accent colors (exceeding 10%)\n- Random or inconsistent margins/padding\n- Insufficient contrast between text and background\n- Unnecessary custom CSS when Tailwind utilities suffice\n\n## Related Concepts\n\n- [Design Tokens](./design-tokens.md)\n- [Component Patterns](../components/component-patterns.md)\n- [Layout Patterns](../components/layout-patterns.md)\n- [DESIGN.md Standard Specification](../architecture/design-standard-spec.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"process/agent-generation.md","content":"---\ntype: Process\ntitle: Agent Generation Guides\ndescription: Guides for generating hierarchical CLAUDE.md and AGENTS.md structures optimized for AI coding agents\nresource: ./templates/instructional-documents/generate-claude-agents.md\ntags: [designs, agents, claude, codex, generation, claude-md, agents-md, hierarchy]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Agent Generation Guides\n\n## Overview\n\nTwo guides provide structured processes for generating hierarchical instruction files optimized for AI coding agents:\n\n1. **generate-claude-agents.md** - For Claude Code's CLAUDE.md system\n2. **generate_agents.md** - For generic AGENTS.md hierarchy\n\n## CLAUDE.md Generation (Claude Code)\n\nClaude Code has unique capabilities: strict instruction hierarchy, hierarchical memory (reads CLAUDE.md recursively), hooks system, MCP integration, custom slash commands, subagents, and extended thinking.\n\n### Process Phases\n\n1. **Repository Analysis** - Architecture, tech stack, testing, CI/CD, directory structure for CLAUDE.md files, dangerous patterns, tool permissions\n2. **Root CLAUDE.md** (~200-400 lines) - Project identity, universal rules (MUST/SHOULD/MUST NOT), core commands, structure map, JIT find commands, security, git workflow, testing strategy, available tools, directory-specific pointers\n3. **Subdirectory CLAUDE.md** (100-200 lines each) - Package identity, setup/commands, architecture/patterns, key files, JIT search hints, common gotchas, testing, pre-PR validation\n4. **Claude Code Configuration** - Hooks (`.claude/settings.json`), custom slash commands (`.claude/commands/`), MCP server recommendations, subagent configurations\n\n### Quality Checklist\n\n- Root under 400 lines, all subdirectory files link back to root\n- Every DO has a real file example, every DON'T references an anti-pattern\n- Commands are copy-paste ready, hooks target specific patterns\n- JIT search commands use actual file patterns\n\n## AGENTS.md Generation (Generic)\n\n### Core Principles\n\n1. Root AGENTS.md is lightweight - only universal guidance, links to sub-files\n2. Nearest-wins hierarchy - agents read the closest AGENTS.md\n3. JIT indexing - provide paths/globs/commands, NOT full content\n4. Token efficiency - small, actionable guidance\n5. Sub-folder AGENTS.md files have more detail\n\n### Process Phases\n\n1. **Repository Analysis** - Type, tech stack, major directories, build system, testing, key patterns\n2. **Root AGENTS.md** (~100-200 lines max) - Project snapshot, root commands, universal conventions, security, JIT index/directory map, definition of done\n3. **Sub-folder AGENTS.md** - Package identity, setup/run, patterns/conventions (most important), touch points, JIT index hints, common gotchas, pre-PR checks\n4. **Special Considerations** - Design system, database, API, testing packages\n\n### Quality Checks\n\n- Root under 200 lines, links to all sub-files\n- Concrete examples with actual file paths\n- No duplication between root and sub-files\n- JIT hints use ripgrep/find/glob with actual patterns\n\n## Related Concepts\n\n- [Planning Agent Contracts](./planning-agent-contracts.md)\n- [Builder Agent Contracts](./builder-agent-contracts.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Documentation-First Approach](../decisions/documentation-first-approach.md)\n"},{"filepath":"process/builder-agent-contracts.md","content":"---\ntype: Process\ntitle: Builder Agent Contracts\ndescription: Codex global builder agent pack defining orchestrator, dev, reviewer, tester, compliance roles with warm continuity and task packets\nresource: ./templates/instructional-documents/codex-global-builder-agents.md\ntags: [designs, codex, builder, agents, orchestrator, dev, reviewer, tester, compliance, contracts]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Builder Agent Contracts\n\n## Overview\n\nThe v1 builder pack installed under `~/.codex/agents/` defines the governed build agents that begin from `/start-session` and stop at `ready-for-integration`.\n\n## Goals\n\n- Keep planning handoff separate from build execution\n- Use `start-session` as explicit entrypoint into isolated worktree execution\n- Preserve one warm writer session per task\n- Reuse orchestrator-mediated communication pattern from planning pack\n\n## Builder Roster\n\n| Agent | Sandbox | Responsibility | Final Publisher |\n|-------|---------|---------------|-----------------|\n| builder_orchestrator | workspace-write | Intake, task-packet reconstruction, lane routing, warm continuity, line-stop/replan | Yes |\n| dev | workspace-write | Sole durable writer for code, tests, fixtures, corrections | No |\n| reviewer | read-only | Diff-scoped correctness, acceptance, owned-surface review | No |\n| tester | read-only | Targeted verification against changed files, regression surface | No |\n| compliance | read-only | Requirement traceability and final ready-for-integration gate | No |\n\n## Ownership Boundaries\n\n- `builder_orchestrator` does not edit implementation code; it governs build flow.\n- `dev` is the only agent allowed to make durable edits in the task worktree.\n- `reviewer`, `tester`, `compliance` are read-only by design.\n- Builder v1 stops at `ready-for-integration`. UAT, QA, and production promotion are downstream.\n\n## Worktree Execution Model\n\n- `start-session` creates the isolated worktree and branch context\n- Default mode is sequential sprint mode: one shared sprint worktree for serial dependency chain\n- Separate task worktrees reserved for true parallel lanes, isolated replays, or explicit isolation\n\n## Task Packet\n\nEvery task starts from a frozen task packet reconstructed from GitHub issue content, checklist state, comments, and repo context.\n\n### Required Packet Fields\n\n`task_id`, `issue_refs`, `goal`, `inferred_intent`, `confidence`, `project_trajectory`, `active_vectors`, `current_scope`, `constraints`, `non_goals`, `owned_files`, `input_contracts`, `output_contracts`, `required_schema`, `required_test_data`, `required_artifacts`, `preload_steps`, `fixture_locations`, `acceptance_criteria`, `validators`, `validation_scope`, `regression_surface`, `release_vector_matrix`, `lessons_learned`, `open_findings`, `line_stop_conditions`.\n\n### Packet Freeze Rule\n\nNo parallel lane may start until the task packet is frozen. Missing substantial schema, data, or artifacts is a prerequisite planning failure that line-stops back to replanning.\n\n## Lane Sequence\n\n1. `start-session` creates shared sprint worktree\n2. `builder_orchestrator` reconstructs and freezes task packet\n3. `dev` starts warm implementation session\n4. `builder_orchestrator` captures narrow change snapshot\n5. `reviewer` and `tester` run from same stable snapshot\n6. `compliance` runs after correction loop is clean\n7. Findings route back into same warm `dev` session\n8. On success, task exits as `ready-for-integration`\n9. Next adjacent serial task reuses same sprint worktree\n\n## Warm Builder Continuity\n\nThe same `dev` session is reused across build, review-fix, test-fix, and compliance-fix loops. Reviewer, tester, and compliance remain stateless lanes.\n\n## Complexity Rules\n\n- Small task-local fixtures/mocks remain in `dev` lane\n- Large schema, data-shaping, or broad environment setup must be split into prerequisites\n- Hidden prerequisite discovery is a line-stop, not \"figure it out in dev\"\n\n## Related Concepts\n\n- [Planning Agent Contracts](./planning-agent-contracts.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Agent Generation](./agent-generation.md)\n"},{"filepath":"process/closeout-process.md","content":"---\ntype: Process\ntitle: Closeout Process\ndescription: Post-enhancement ship flow for publishing branches, verifying from remote, summarizing state, cleanup, and global install\nresource: ./templates/instructional-documents/close_out_items_shipping.md\ntags: [designs, closeout, shipping, release, verification, cleanup]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Closeout Process\n\n## Prerequisites\n\n1. Confirm with requestor that pending changes are approved for shipping (no open TODOs, all reviews resolved)\n2. If the request explicitly says to perform close-out actions, do them without deflecting back\n3. If anything is unclear or unspecified, pause and ask, do not improvise\n4. Follow steps in order. Do not move to the next step if the previous could not be performed\n\n## Step 1: Publish the Branch and Tags\n\n- Fast-forward local `main` to contain approved enhancement commits\n- Push `main` to remote: `git push origin main`\n- Push the release tag: `git push origin [project_name]-vX.Y.Z`\n\n## Step 2: Verify from Remote Source of Truth\n\n- Create a fresh worktree from `origin/main`\n- Run the release build in the verification worktree\n- After build succeeds (and UAT signs off), remove the verification worktree\n\n## Step 3: Summarize Repository State\n\n- Report list of local branches still present\n- Confirm no staged or unstaged files\n- Record `origin/main` commit SHA and call out any divergence\n\n## Step 4: Cleanup (After Approval)\n\n- Remove temporary branches and worktrees created for the release\n\n## Step 5: Install the Released Binary Globally\n\n- Run `cargo install --path cli --bin [project_name]-agent` to update the user's default executable\n\n## Step 6: Document Release Metadata\n\n- List the latest five tags in reverse chronological order for stakeholder visibility\n\n## Key Rules\n\n- Do NOT continue if a step fails. Tell the user why and discuss how to plan the move forward.\n- Only ask follow-up questions when a detail is missing or ambiguous.\n- Steps must be followed sequentially.\n\n## Related Concepts\n\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [GitHub Workflow Guide](./github-workflow.md)\n- [Deployment Guide](./deployment-guide.md)\n- [Implementation Checklist](./implementation-checklist.md)\n"},{"filepath":"process/convex-self-hosted.md","content":"---\ntype: Process\ntitle: Convex Self-Hosted Setup\ndescription: Self-hosted Convex infrastructure on Hetzner with Docker, dual environments, admin keys, and deployment workflows\nresource: ./templates/instructional-documents/convex-self-hosted-setup.md\ntags: [designs, convex, self-hosted, hetzner, docker, infrastructure, database, deployment]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Convex Self-Hosted Setup\n\n## Server Infrastructure\n\n- **Provider**: Hetzner Cloud (IP: 138.199.235.169)\n- **OS**: Linux with Docker\n- **Resources**: 7.5GB RAM, 75GB disk\n- **Services**: Convex (dev + prd), Supabase (dev + prd), N8N, Nginx\n\n## Environments\n\n| Environment | Backend URL | Dashboard URL |\n|-------------|-------------|---------------|\n| Development | dev.convex.macinations.au | dashboard.dev.convex.macinations.au |\n| Production | prd.convex.macinations.au | dashboard.prd.convex.macinations.au |\n\n## Docker Compose Configuration\n\nEach environment runs a Convex backend container and dashboard container. Key environment variables:\n- `POSTGRES_URL` - PostgreSQL connection to Supabase\n- `CONVEX_CLOUD_ORIGIN` / `CONVEX_SITE_ORIGIN` - Public URLs\n- `INSTANCE_SECRET` - 64-char hex for persistent admin keys\n\n### Port Mapping\n\n| Env | Service | Host Port | Container Port |\n|-----|---------|-----------|----------------|\n| Dev | Backend API | 16442 | 3210 |\n| Dev | HTTP Actions | 16444 | 3211 |\n| Dev | Dashboard | 16445 | 6791 |\n| Prd | Backend API | 16443 | 3210 |\n| Prd | HTTP Actions | 16447 | 3211 |\n| Prd | Dashboard | 16446 | 6791 |\n\nAll backend ports bound to `127.0.0.1` only; Nginx handles external access with SSL.\n\n## Admin Keys\n\nGenerated using `./generate_admin_key.sh` inside the backend container. Keys are persistent as long as `INSTANCE_SECRET` remains unchanged.\n\n## Database\n\nConvex uses a separate database called `convex_self_hosted` in each Supabase instance (not a schema in `postgres`). Internal tables: `documents`, `indexes`, `leases`, `persistence_globals`, `read_only`.\n\n## Local Development\n\n```bash\n# .env.local\nCONVEX_SELF_HOSTED_URL=https://dev.convex.macinations.au\nCONVEX_SELF_HOSTED_ADMIN_KEY=convex-self-hosted|01xxxxx...\nNEXT_PUBLIC_CONVEX_URL=https://dev.convex.macinations.au\n\n# Deploy\nnpx convex deploy\n\n# Deploy to prd\nCONVEX_SELF_HOSTED_URL=https://prd.convex.macinations.au \\\nCONVEX_SELF_HOSTED_ADMIN_KEY=<key> \\\nnpx convex deploy\n```\n\n## Vercel Integration\n\nNext.js frontend on Vercel connects to self-hosted Convex. Do NOT set `CONVEX_DEPLOYMENT` when using self-hosted Convex.\n\n## Stripe Webhooks\n\nStripe webhooks are handled by Convex HTTP actions (not Vercel/Next.js). Webhook URL: `https://prd.convex.macinations.au/stripe-webhook`\n\n## WorkOS Authentication\n\nRedirect URIs configured in WorkOS Dashboard for production and local dev. WorkOS env vars set in both Vercel and Convex.\n\n## Operations\n\n- Start/stop services via Docker Compose\n- View logs: `docker logs -f convex-dev-backend`\n- Health check: `curl -s https://dev.convex.macinations.au/version`\n- Data export/import: `npx convex export/import`\n- SSL via Certbot (Let's Encrypt), auto-renewed\n\n## Troubleshooting\n\n- WebSocket 1011 errors: deploy functions with `npx convex deploy`\n- Admin key invalid: check `INSTANCE_SECRET` in docker-compose\n- Server overload during import: trim large tables, stop non-essential services\n\n## Related Concepts\n\n- [Deployment Guide](./deployment-guide.md)\n- [Stripe Payment Integration](./stripe-payment-integration.md)\n- [WorkOS Auth Integration](./workos-auth-integration.md)\n- [GitHub Workflow Guide](./github-workflow.md)\n"},{"filepath":"process/create-schema-diagrams.md","content":"---\ntype: Process\ntitle: Create Schema Diagrams\ndescription: How to create mermaid ER diagram concepts from database schema sources\nresource: ./templates/okf/DEPLOYMENT-RUNBOOK.md\ntags: [okf, schema, mermaid, er-diagram, database]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Create Schema Diagrams\n\nPhase 4 of the OKF deployment workflow. If the project has a database schema (SQL, SpacetimeDB, Prisma, etc.), create mermaid ER diagram concepts to document the data model.\n\n## Step 1: Read Schema Source\n\nIdentify and read the schema source files to determine all tables, columns, primary keys, foreign keys, and relationships. Also read any existing schema reference docs in `docs/` or `docs/design/`.\n\n## Step 2: Group Tables by Domain\n\nGroup tables into logical domains. For example:\n- **Planning:** planning_tables, route_tables, schedule_tables\n- **Orders:** order_tables, fulfillment_tables\n- **Users:** user_tables, auth_tables, profile_tables\n- **Inventory:** inventory_tables, stock_tables\n\n## Step 3: Create Domain Concepts\n\nFor each domain, create a concept file in `knowledge/domain/` with:\n\n- Type: `Domain`\n- A mermaid `erDiagram` code block showing all tables in that domain with key columns (PK, FK, business-critical fields)\n- Relationship lines within the domain\n- Table descriptions\n- Cross-domain relationship notes (mention but do not draw cross-domain lines)\n\n## Mermaid erDiagram Syntax\n\n```mermaid\nerDiagram\n    TABLE_A {\n        int id PK\n        string name\n        int table_b_id FK\n    }\n    TABLE_B {\n        int id PK\n        string description\n    }\n    TABLE_A ||--o{ TABLE_B : \"has many\"\n```\n\n### Relationship Line Types\n\n| Syntax | Meaning |\n|--------|---------|\n| `\\|\\|--o{` | One to many |\n| `\\|\\|--\\|\\|` | One to one |\n| `}o--o{` | Many to many |\n\n### Column Annotations\n\n- `PK` - Primary key\n- `FK` - Foreign key\n- Other columns listed by name and type\n\n## Step 4: Create Architecture Index Concept\n\nCreate an architecture concept that indexes all domain diagrams with a high-level domain relationship graph. This provides a top-level view of how domains relate to each other.\n\n## Step 5: Update Indexes and Log\n\n- Update `knowledge/domain/index.md` with the new domain concept rows.\n- Update `knowledge/architecture/index.md` with the schema index concept.\n- Update the root `index.md` with accurate counts.\n- Update `knowledge/log.md` with a schema diagram entry.\n\n## Viewer Rendering\n\nThe OKF viewer detects mermaid `erDiagram` code blocks in concept bodies and renders them inline using mermaid.js. The viewer scans for `<pre><code>` blocks whose content starts with `erDiagram`, replaces them with mermaid divs, and calls `mermaid.run()`. See [Viewer Architecture](../architecture/viewer-architecture.md).\n\n## Best Practices\n\n- Show only key columns (PK, FK, business-critical fields), not every column.\n- Keep diagram readability high; too many tables in one diagram becomes unreadable.\n- Use cross-domain notes to mention relationships that span domains without drawing them.\n- Include table descriptions as comments or text below the diagram.\n"},{"filepath":"process/curation-pass.md","content":"---\ntype: Process\ntitle: OKF Curation Pass\ndescription: Full curation workflow for processing inbox items and maintaining concept quality\nresource: ./pi-extensions/.factory/droids/okf-curator.md\ntags: [okf, curation, inbox, maintenance, cross-links]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# OKF Curation Pass\n\nCuration transforms inbox items into permanent concept files and maintains the overall quality of the knowledge base. It can be triggered by the `/okf-curate` command, by dispatching the okf-curator droid, or as Phase 6 of the deployment workflow.\n\n## Curation Steps\n\n### 1. Read All Unprocessed Inbox Items\n\nRead all `.md` files in `knowledge/inbox/` (not in `inbox/processed/`). These are session syntheses written by the post-commit hook or by agents. See [Inbox Format](../domain/inbox-format.md).\n\n### 2. Read Existing Concept Files\n\nRead concept files in each directory (`architecture/`, `components/`, `domain/`, `decisions/`, `process/`, `deprecation/`, `state/`) to understand the current knowledge state and avoid duplicates.\n\n### 3. Read Codebase and Git History\n\nRead relevant source code and git history for additional context. This helps the curation agent understand the actual state of the codebase, not just what the inbox items describe.\n\n### 4. Fetch GitHub Issues\n\nFetch and read GitHub issues referenced by `issue_refs` or `epic_refs` in inbox item frontmatter:\n\n```bash\ngh issue view <number> --json body,title,labels,closedAt --jq '.body'\n```\n\nThese issues contain rich context: pre-approved directives, acceptance criteria, linked epics, and full reasoning. They are not just short bug fix notes. If an issue has linked epics or sub-issues, fetch those too. Use this context to enrich concepts beyond what the commit message or session synthesis alone provides.\n\n### 5. Create or Update Concepts\n\nFor each inbox item, determine which concept(s) to create or update:\n\n| Inbox content | Target directory |\n|---------------|-----------------|\n| Architectural changes | `architecture/` |\n| UI component work | `components/` |\n| Business logic changes | `domain/` |\n| Decisions with rationale | `decisions/` |\n| Workflow/process changes | `process/` |\n| Superseded patterns | `deprecation/` |\n| Current status updates | `state/` |\n\n- **New concepts:** Create with proper frontmatter (type, title, description, tags, resource, timestamp, issue_refs).\n- **Updated concepts:** Merge new information with existing, preserving prior context.\n- **Superseded concepts:** Move the old file to `deprecation/` and add a `supersedes` field.\n\n### 6. Add Cross-Links\n\nWhere one concept references another, ensure the body text links to the related concept using relative markdown links (e.g., `[Related](../architecture/viewer-architecture.md)`). See [Link Resolution](../domain/link-resolution.md).\n\n### 7. Check for Duplicates and Missing Concepts\n\n- Merge concepts that cover the same topic.\n- If a topic is referenced but has no concept, create one.\n\n### 8. Move Superseded Concepts\n\nMove any superseded concepts to `deprecation/` with `supersedes` links pointing to the replacement.\n\n### 9. Process Inbox Items\n\nMove processed inbox items to `knowledge/inbox/processed/`.\n\n### 10. Update Indexes and Log\n\n- Update all `index.md` files with current listings and accurate counts. See [Index Structure](../domain/index-structure.md).\n- Update `knowledge/log.md` with a summary of all changes in reverse chronological order.\n\n### 11. Update State Concept\n\nEnsure the State concept reflects the current project status after all curation.\n\n## Curation Rules\n\n- Never delete a concept file. Move superseded ones to `deprecation/` instead.\n- One concept per file. Do not mix types.\n- Filenames should be slugified versions of the title.\n- Use lowercase, consistent tags across concepts.\n- The `resource` field should point to the most relevant code file, doc, or GitHub issue.\n- Always include `issue_refs` in frontmatter when the concept was derived from or relates to GitHub issues.\n- Synthesize across multiple inbox items when they relate to the same concept.\n- Preserve the reasoning and rationale from inbox items AND GitHub issues, not just the facts.\n- Cross-link related concepts using markdown relative paths.\n\n## Curation Output\n\nThe curator reports:\n\n```\nCuration cycle: <ISO timestamp>\n\nGitHub issues fetched:\n- #<number>: <title>\n\nProcessed:\n- <inbox filename> -> <action taken>\n\nCreated:\n- <concept filepath>\n\nUpdated:\n- <concept filepath>\n\nDeprecated:\n- <old filepath> -> <new filepath>\n\nLog entry added to knowledge/log.md\n```\n\n## Triggering Curation\n\n- **Pi extension:** `/okf-curate` command generates a curation prompt with inbox item list and issue refs.\n- **Curator droid:** Dispatch the `okf-curator` droid for a full curation pass.\n- **Deployment Phase 6:** Run as part of the [deployment workflow](./deploy-okf.md).\n"},{"filepath":"process/delivery-lifecycle.md","content":"---\ntype: Process\ntitle: Delivery Lifecycle\ndescription: Governed delivery lifecycle from planning approval through implementation, compliance, QA/UAT, production approval, and closeout\nresource: ./README.md\ntags: [designs, delivery, lifecycle, governance, qa, uat, production, closeout]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Delivery Lifecycle\n\n## Overview\n\nThe delivery lifecycle governs the flow from planning approval to closeout, with stage gates for compliance, QA/UAT, and production approval.\n\n## Lifecycle Stages\n\n1. **Planning approved** - Entry point into the governed build session\n2. **Start governed build session** - Create isolated worktree context\n3. **Freeze task packet** - Lock down requirements, contracts, and acceptance criteria\n4. **Implementation** - Write code, tests, fixtures\n5. **Review, tests, compliance** - Quality gates run\n6. **Compliance and DoD review** - Definition of Done ranking\n7. **DoD rank passes?** - Gate: No -> back to implementation; Conditional -> owner accepts caveats; Yes -> proceed\n8. **Project-defined CI/CD authority** - Build validation\n9. **QA readiness manifest** - Prepared for QA\n10. **QA/UAT approved?** - Gate: No -> rework/replan; Yes -> proceed\n11. **Production approval gate** - Owner approves promotion\n12. **Owner approved promotion?** - Gate: No -> stays at gate; Yes -> proceed\n13. **Governed production promotion** - Deploy to production\n14. **Production smoke** - Post-deployment verification\n15. **Final signoff?** - Gate: No -> rework/replan; Yes -> proceed\n16. **Closeout and lessons learned** - Document and archive\n\n## Stage Gates\n\n| Gate | Decision Point | Failure Path |\n|------|---------------|--------------|\n| DoD rank | Pass / Conditional / No | No -> implementation; Conditional -> owner decision |\n| QA/UAT | Approved / Not approved | Not approved -> rework or replan |\n| Production approval | Owner approved / Not | Not -> stays at gate |\n| Final signoff | Pass / Fail | Fail -> rework or replan |\n\n## Key Principles\n\n- Implementation can loop back from any quality gate\n- Owner acceptance is required for conditional DoD passes\n- Production promotion is explicitly governed, not automatic\n- Closeout captures lessons learned for future cycles\n\n## Mermaid Diagram\n\nThe README contains a mermaid flowchart visualizing this lifecycle from \"Planning approved\" through to \"Closeout and lessons learned\".\n\n## Related Concepts\n\n- [Planning Decomposition](./planning-decomposition.md)\n- [Builder Agent Contracts](./builder-agent-contracts.md)\n- [Closeout Process](./closeout-process.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Workflow Guide](./workflow-guide.md)\n- [Deployment Guide](./deployment-guide.md)\n"},{"filepath":"process/deploy-okf.md","content":"---\ntype: Process\ntitle: Deploy OKF to a Project\ndescription: Full 8-phase deployment workflow from mechanical install to final verification\nresource: ./templates/okf/DEPLOYMENT-RUNBOOK.md\ntags: [okf, deployment, runbook, install, workflow]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Deploy OKF to a Project\n\nThe OKF deployment runbook defines an 8-phase workflow that any agent can follow to deploy OKF to a project consistently. The full runbook is at `./templates/okf/DEPLOYMENT-RUNBOOK.md`.\n\n## Prerequisites\n\n- The project must be a git repository.\n- `designs/templates/okf/` must be available (the OKF template source).\n- The agent must have read access to the project's existing docs, GitHub issues, and source code.\n- `gh` CLI must be available if the project has GitHub issues/epics.\n\n## Phase 1: Mechanical Install\n\nRun the installer script to create the knowledge directory structure, copy the viewer and generator, install the post-commit hook, and update AGENTS.md. See [Installer Design](../architecture/installer-design.md).\n\n```bash\nbash <path-to-designs>/templates/okf/install-okf.sh <project-root>\n```\n\nVerify: `knowledge/index.md` exists, `knowledge/log.md` exists, `.githooks/post-commit` is executable, `git config core.hooksPath` returns `.githooks`.\n\n## Phase 2: Seed From Existing Docs\n\nRead the project's existing documentation (AGENTS.md, docs/, docs/design/, docs/agents/, README.md) and create OKF concepts for each significant topic. This establishes the knowledge baseline. See [Seed From Existing Docs](./seed-from-existing-docs.md).\n\n## Phase 3: Process GitHub Epics\n\nList closed epics with `gh issue list --label epic --state closed`, fetch each epic body, and create Process/Domain concepts for recent epics or Deprecation entries for older ones. See [Process GitHub Epics](./process-github-epics.md).\n\n## Phase 4: Create Schema Diagrams\n\nIf the project has a database schema, create mermaid ER diagram concepts grouped by domain. See [Create Schema Diagrams](./create-schema-diagrams.md).\n\n## Phase 5: Migrate AGENTS.md\n\nUpdate the project's AGENTS.md to replace AFFiNE/docs references with OKF references, add the OKF Knowledge Bundle section, and add legacy documentation alignment. See [Migrate AGENTS.md](./migrate-agents-md.md).\n\n## Phase 6: Curation Pass\n\nRead all concepts, add cross-links, check for duplicates, check for missing concepts, move superseded to deprecation, verify index counts, update log.md and state. See [Curation Pass](./curation-pass.md).\n\n## Phase 7: Generate Viewer\n\nGenerate the self-contained viz.html:\n\n```bash\nnode <project-root>/knowledge/generate-viz.js <project-root>/knowledge\n```\n\nVerify the browse tab, graph tab, mermaid rendering, link navigation, and search filtering all work. See [Viz Generator Design](../architecture/viz-generator-design.md).\n\n## Phase 8: Final Verification\n\nCount concepts per directory and verify index counts match. Verify no AFFiNE references in AGENTS.md. Verify no docs/agents/ references in AGENTS.md. Verify the OKF Knowledge Bundle section exists. Verify the post-commit hook is installed. Verify viz.html exists. See [Verify Deployment](./verify-deployment.md).\n\n## Post-Deployment\n\nAfter deployment, the project is ready for ongoing OKF usage:\n- Agents read `knowledge/` concepts before starting work.\n- Agents write session syntheses to `knowledge/inbox/` after completing work.\n- The post-commit hook captures commit metadata automatically.\n- `/okf-curate` processes inbox items into permanent concepts.\n- The curation droid can be dispatched for periodic curation passes.\n- `viz.html` can be regenerated after any knowledge changes.\n"},{"filepath":"process/deployment-guide.md","content":"---\ntype: Process\ntitle: Deployment Guide\ndescription: Dual-environment deployment with Vercel for production demos and Dokku on Hetzner for UAT testing\nresource: ./templates/instructional-documents/deployment-guide.md\ntags: [designs, deployment, vercel, dokku, hetzner, docker, ci-cd]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Deployment Guide\n\n## Environments\n\n| Environment | Platform | Purpose | Trigger |\n|-------------|----------|---------|---------|\n| Production Demo | Vercel | Stakeholder demos, public access | Auto on main push |\n| UAT/Testing | Dokku on Hetzner | Personal testing, validation | Auto on main push |\n| PR Previews | Vercel | Review changes before merge | Auto on every PR |\n\n## Vercel Setup (Production Demo)\n\nVercel provides zero-config Next.js deployments with automatic preview URLs for every PR.\n\n- CLI setup: `vercel login`, `vercel` from project root\n- Environment variables set in Vercel Dashboard (CONVEX_DEPLOYMENT, NEXT_PUBLIC_CONVEX_URL, WORKOS keys)\n- Features: auto-deploy on main push, preview URLs per PR, one-click rollbacks, analytics\n\n## Dokku on Hetzner (UAT/Testing)\n\nDokku is a lightweight PaaS running on a Hetzner VPS.\n\n### Setup Steps\n1. Install Dokku on the server\n2. Create app: `dokku apps:create fms-glm`\n3. Set domain and environment variables\n4. Configure SSL with Let's Encrypt\n\n### Project Configuration\n- `next.config.ts` with `output: 'standalone'`\n- Multi-stage Dockerfile (builder + runner)\n- `.dockerignore` for node_modules, .next, .git\n- Optional `app.json` with healthchecks\n\n### Deployment\n- Manual: `git push dokku main`\n- Automatic: GitHub Actions workflow using `dokku/github-action`\n\n## Reverse Proxy Integration\n\nDokku uses nginx by default. Options:\n- Let Dokku manage its own proxy on a different port\n- Disable Dokku's proxy and use existing reverse proxy (nginx/Traefik)\n\n## Deployment Flow\n\n```\nGitHub main push\n  -> GitHub Actions -> Hetzner/Dokku (UAT)\n  -> Vercel webhook -> Vercel (Production)\n```\n\nPR creation triggers Vercel preview deploy with unique URL.\n\n## Security Considerations\n\n1. Never commit secrets - use environment variables\n2. Use SSH keys for Dokku deployments\n3. Enable SSL with Let's Encrypt on both platforms\n4. Rotate deployment keys periodically\n5. Use GitHub branch protection rules\n\n## Related Concepts\n\n- [GitHub Workflow Guide](./github-workflow.md)\n- [Convex Self-Hosted Setup](./convex-self-hosted.md)\n- [WorkOS Auth Integration](./workos-auth-integration.md)\n- [Stripe Payment Integration](./stripe-payment-integration.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n"},{"filepath":"process/github-workflow.md","content":"---\ntype: Process\ntitle: GitHub Workflow Guide\ndescription: Graphite-style stacking workflow with squash merge, branch chaining, and force-with-lease rebasing\nresource: ./templates/instructional-documents/github-workflow.md\ntags: [designs, github, workflow, graphite, stacking, squash-merge, git]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# GitHub Workflow Guide\n\n## Mandatory Requirements\n\n| Rule | Requirement |\n|------|-------------|\n| Merge Type | ALWAYS use squash merge, no exceptions |\n| Rebasing | MUST rebase regularly to keep stack in sync with main |\n| PR Size | Small, focused, ONE logical change per PR |\n| Tooling | Use `gh pr merge --squash --delete-branch` |\n\n## Core Concept: Stacking\n\nStacking means building chains of small, focused PRs where each depends on the previous:\n\n```\nmain <- PR1 <- PR2 <- PR3 (chain of small PRs)\n```\n\nThis allows breaking large features into reviewable chunks, faster feedback, continuing work while waiting for reviews, and independent merging as PRs are approved.\n\n## Creating a Stack\n\n1. Create first branch from `origin/main`\n2. Each subsequent branch starts from the previous branch, not main\n3. PRs target their parent branch (not main), except the first PR targets main\n\n## Managing the Stack\n\n- View stack: `git branch -vv`, `git log --oneline --graph --all`\n- Update middle branch: commit, push `--force-with-lease`, then rebase all dependent branches\n- Use `--force-with-lease` instead of `--force` for safety\n\n## Squash Merge (Required)\n\nSquash merging creates a single atomic commit per PR, prevents intermediate broken states, keeps the dev server stable, and results in cleaner git history.\n\n```bash\ngh pr merge <PR_NUMBER> --squash --delete-branch\ngit checkout main\ngit pull origin main\n```\n\n## After Bottom PR Merges\n\n1. Fetch updated main\n2. Rebase next branch onto `origin/main`\n3. Push `--force-with-lease`\n4. Change PR base to main on GitHub: `gh pr edit <pr-number> --base main`\n\n## Best Practices\n\n- Keep PRs small (< 30 min review time)\n- Name branches clearly: `feature/1-database-schema`, `feature/2-api-endpoints`\n- Include stack context in PR descriptions (Previous, Next PR numbers)\n- Use draft PRs until parent is approved\n- Limit stacks to 3-5 PRs\n\n## PR Description Template\n\nInclude: Part X of Y, This PR, Stack Context (Previous/Next), Implementation Details (files, API changes, breaking changes), Testing (unit, integration, manual), Documentation updates, Verification Checklist.\n\n## Automation Scripts\n\n- `rebase-stack.sh` - Rebase entire stack onto a base branch\n- `sync-stack.sh` - Sync all branches with `origin/main`\n\n## Troubleshooting\n\n- Diverged branch: check logs, force-with-lease if local is correct\n- Lost commits after rebase: use `git reflog` to recover\n- Circular dependencies: reset to main and recreate branches in correct order\n\n## Related Concepts\n\n- [Graphite Stacking for Docs](../decisions/graphite-stacking-for-docs.md)\n- [Deployment Guide](./deployment-guide.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [GitHub Usage System Prompt](https://github.com/holovkat/designs/blob/main/templates/instructional-documents/github-usage-system-prompt.md)\n"},{"filepath":"process/implementation-checklist.md","content":"---\ntype: Process\ntitle: Implementation Checklist\ndescription: Functional design implementation checklist template with phased steps from architecture overview through deployment strategy\nresource: ./templates/functional-design/00-TEMPLATE-IMPLEMENTATION-CHECKLIST.md\ntags: [designs, implementation, checklist, functional-design, sprints, tracking]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Implementation Checklist\n\n## Overview\n\nThe implementation checklist tracks the implementation status of a project's epics and features, organized into sprints. It should be updated as new design documents are created.\n\n## Template Structure\n\n### Sprint 1: Foundational Setup and User Onboarding\n\nCore infrastructure phase with tasks mapped to numbered design documents:\n\n| Doc | Topic |\n|-----|-------|\n| 01-ARCHITECTURE-OVERVIEW.md | Architecture overview |\n| 02-FOLDER-LAYOUT.md | Folder layout |\n| 03-SETTINGS-AND-CONFIG.md | Settings and config |\n| 04-WEB-UI-SETUP.md | Web UI setup |\n| 05-DATABASE-SETUP.md | Database setup |\n| 06-AUTHENTICATION-SETUP.md | Authentication setup |\n| 07-API-INTEGRATION.md | API integration strategy |\n| 08-INFRASTRUCTURE-SETUP.md | Infrastructure and containerization |\n| 09-VERSION-CONTROL-STRATEGY.md | Version control |\n| 10-CI-CD-PIPELINE.md | CI/CD pipeline |\n\nFeature phases (11+) follow, each with Design, Implementation, and Verification sub-tasks.\n\n### Post-Release Tasks\n\n- 98-TESTING-AND-VERIFICATION.md - Testing and verification\n- 99-DEPLOYMENT-STRATEGY.md - Deployment\n\n## Live vs Template\n\nThe designs repo maintains two versions:\n- **00-TEMPLATE-IMPLEMENTATION-CHECKLIST.md** - Archived template baseline\n- **00-IMPLEMENTATION-CHECKLIST.md** - Live implementation status for the designs repo itself\n\n## Live Repo Checklist\n\nThe live checklist tracks the Codex Global Planning Agent Pack and Codex Builder Agent Pack sprints with GitHub issue references, contract gates, shared status formats, and exit gates.\n\n### Exit Gates Include\n\n- Planning compliance >= 95/100 before sign-off\n- Frozen contract in place before parallel work\n- Global `~/.codex/agents` packs installed\n- Orchestrators remain governance-only\n- Specialists use fixed payload format\n- Built-in Codex activity shows delegation\n- Builder stops at `ready-for-integration`\n\n## Related Concepts\n\n- [Kickoff Requirements](./kickoff-requirements.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Planning Agent Contracts](./planning-agent-contracts.md)\n- [Builder Agent Contracts](./builder-agent-contracts.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"process/install-session-workflows.md","content":"---\ntype: Process\ntitle: Install Session Workflows\ndescription: Installer script for refreshing commands, hooks, scripts, skills, and worktree guidance into another project\nresource: ./templates/instructional-documents/install-session-workflows.sh\ntags: [designs, installer, session, workflows, commands, hooks, skills, scripts]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Install Session Workflows\n\n## Overview\n\nThe `install-session-workflows.sh` script refreshes commands, scripts, skills, hooks, and worktree guidance in an existing project. Safe to run multiple times, overwriting existing files with latest template versions.\n\n## Usage\n\n```bash\n./install-session-workflows.sh [OPTIONS]\n```\n\n### Options\n\n| Option | Description |\n|--------|-------------|\n| `--commands-only` | Only install commands + scripts/skills/worktrees, skip hooks |\n| `--hooks-only` | Only install hooks, skip commands + scripts/skills/worktrees |\n| `--no-settings` | Skip copying settings.json |\n| `--with-templates` | Also install design templates |\n| `--dry-run` | Show what would be copied without copying |\n| `--help` | Show help message |\n\n### Environment Overrides\n\n- `DESIGNS_WORKFLOW_SOURCE` - Source template directory when refreshing from a project copy\n- `WORKFLOW_COMMANDS_DIR` - Target command directory (default: `./commands`)\n- `WORKFLOW_HOOKS_DIR` - Target hook directory (default: `./hooks`)\n- `WORKFLOW_SETTINGS_FILE` - Target settings file (default: `./settings.json`)\n\n## What Gets Installed\n\n### Commands\nSlash command templates from `commands/`:\n- `/plan-feature`, `/plan-bugfix`, `/plan-github`, `/plan-review`\n- `/compliance-review`, `/uat`\n- `/end-session`, `/join-session`, `/next-phase`\n- `/release-assess`, `/kingmode`\n\n### Scripts\nShell scripts from `scripts/`:\n- `release-vector-assess.sh` - Release vector assessment\n- `start-droid-worktree.sh` - Droid worktree management\n- `worktree-session-*.sh` - Worktree session lifecycle (open, close, prepare, cleanup, lib)\n\n### Skills\nProject-local skills from `skills/`:\n- `worktree-toolkit-init` - Session tooling audit/update\n- `worktree-session-lifecycle` - Operational session flow\n- `plan-review` - Planning artifact review\n- `release-assess` - Release intent/confidence routing\n- `vibe-fix` - Small pragmatic behavior fix\n\n### Hooks\nGit hooks from `hooks/`:\n- `pre-commit-workflow.sh` - Pre-commit validation\n- `post-commit-push.sh` - Post-commit push\n- `post-edit-lint.sh` - Post-edit linting\n- `code-review-checkpoint.sh` - Code review checkpoint\n- `pre-completion-build.sh` - Pre-completion build check\n- `batch-lint-check.sh` - Batch lint check\n- `sanity-check.sh` - Sanity check\n\n### Worktrees\nWorktree guidance from `worktrees/`:\n- `AGENTS.md` - Worktree area agent instructions\n- `README.md` - Worktree guidance overview\n- `_meta/` - Metadata\n\n### Settings\n- `settings.json` - Basic settings\n- `settings-agent-aware.json` - Agent-aware settings\n\n## Source Detection\n\nThe script auto-detects whether it is running from the template source (has `commands/` and `hooks/` subdirectories) or from a project's command directory. When running from a project, it sources from `DESIGNS_WORKFLOW_SOURCE` or `$HOME/workspace/designs/templates/instructional-documents`.\n\n## Related Concepts\n\n- [Templates Architecture](../architecture/templates-architecture.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Workflow Guide](./workflow-guide.md)\n- [GitHub Workflow Guide](./github-workflow.md)\n"},{"filepath":"process/kickoff-requirements.md","content":"---\ntype: Process\ntitle: Kickoff Requirements Spec\ndescription: Requirements gathering and technical specification process for creating TFD documents and technical requirement shards\nresource: ./templates/instructional-documents/kickoff-requirements-spec.md\ntags: [designs, kickoff, requirements, tfd, specification, sharding, planning]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Kickoff Requirements Spec\n\n## Overview\n\nAn expert Technical Product Manager and System Architect process for gathering requirements to create a comprehensive Frontend Technical Functional Requirements Document (TFD) and break it down into actionable Technical Requirement Shards.\n\n## Phase 1: Requirements Gathering\n\n### Protocol\n\n1. **One question at a time** - Never ask multiple questions in a single turn\n2. **Multiple choice** - Provide numbered/lettered options, always allow \"Other/Custom\"\n3. **No ambiguities** - If answer is vague, ask follow-up clarifying question\n4. **Iterative validation** - After each section, summarize and confirm before moving on\n\n### Lines of Questioning\n\n1. **Project Overview** - Purpose, primary goals, target audience\n2. **Technical Stack** - Framework, state management, styling, routing\n3. **Design System** - Atomic design preferences, existing libraries or custom\n4. **Features and Phases** - High-level features, prioritization, desired phases\n5. **Navigation** - Routing structure, public vs protected routes\n6. **State Management** - Server state, global state, local state strategies\n7. **Integrations** - APIs, Auth, 3rd party services\n8. **Non-Functional** - Performance, Accessibility, SEO, Testing\n\n### Output\n\nGenerate the TFD file at `features/Frontend-TFD.md` or project root, using the template structure from `templates/instructional-documents/Frontend-Technical-Functional-Requirements-Document-TFD.md`.\n\n## Phase 2: Technical Sharding\n\n### Sharding Strategy\n\n- **Core Infrastructure** - Create/update standard setup files (01-10) as seen in `templates/functional-design`\n- **Features** - Create separate files for each major feature (11+), mapping to phases in TFD\n\n### Naming Convention\n\nFollow `templates/functional-design` convention:\n- `00-IMPLEMENTATION-CHECKLIST.md` (Master checklist)\n- `01-ARCHITECTURE-OVERVIEW.md`\n- `02-FOLDER-LAYOUT.md`\n- `11-FEATURE-[NAME].md`\n- `12-FEATURE-[NAME].md`\n\n### Output\n\nGenerate shard files in `features/` folder. Each shard contains:\n- Feature Goal\n- User Stories / Requirements\n- Technical Implementation Details (Components, APIs, State)\n- Verification Plan\n- Update `00-IMPLEMENTATION-CHECKLIST.md` to include all generated shards\n\n## Related Concepts\n\n- [Planning Decomposition](./planning-decomposition.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Templates Architecture](../architecture/templates-architecture.md)\n"},{"filepath":"process/migrate-agents-md.md","content":"---\ntype: Process\ntitle: Migrate AGENTS.md to OKF\ndescription: How to update a project's AGENTS.md to use OKF references instead of docs/AFFiNE\nresource: ./templates/okf/AGENTS-OKF-SECTION.md\ntags: [okf, agents-md, migration, affine, legacy]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Migrate AGENTS.md to OKF\n\nPhase 5 of the OKF deployment workflow. Update the project's `AGENTS.md` to use OKF references instead of `docs/`/AFFiNE references.\n\n## Replace AFFiNE References\n\n- Find any section referencing AFFiNE (project notes, change log, knowledge base).\n- Replace with OKF inbox/curation instructions: write to `knowledge/inbox/`, run `/okf-curate`.\n\n## Update Agent Delegation Section\n\n- Replace `docs/agents/<area>/AGENTS.md` references with `knowledge/process/<agent>.md` concept references.\n- Replace \"agent knowledge space under `docs/agents/`\" with \"OKF concept in `knowledge/process/`\".\n- Update specialist curation example paths to point to `knowledge/process/`.\n\n## Update JIT Index Table\n\n- Add a `knowledge/` row as the primary knowledge index.\n- Mark `docs/` row as legacy reference.\n- Remove `docs/agents/` row if present.\n\n## Update Specialist Agent Ownership Table\n\n- Rename \"Knowledge space\" column to \"OKF concept\".\n- Point each agent to its `knowledge/process/<agent>.md` concept file.\n- Update \"when an agent area is missing\" to say: create an OKF concept in `knowledge/process/` using `knowledge/process/agent-space-standard.md`.\n\n## Add Legacy Documentation Alignment\n\nAdd a section explaining:\n- `docs/` files remain as detailed references.\n- OKF concepts in `knowledge/` are the agent-facing entry points.\n- Each concept's `resource` field links to the relevant `docs/` file.\n- When docs and OKF disagree, OKF is current.\n\nSee [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md) for the rationale.\n\n## Update Inline References\n\n- Replace `docs/agents/release-process-contract.md` with `knowledge/process/release-process-contract.md`.\n- Replace `docs/design/SPACETIMEDB-V2-REFERENCE.md` with `knowledge/architecture/spacetimedb-v2-reference.md`.\n- Replace other `docs/design/` and `docs/agents/` inline references with their OKF concept equivalents.\n- For reference tables (like SpacetimeDB Documentation), restructure to show OKF concept to detailed doc mapping.\n\n## Preserve What Stays\n\n- `docs/` files are NOT deleted or moved. They remain as detailed references.\n- Sub-directory `AGENTS.md` files (e.g., `src/AGENTS.md`, `server/AGENTS.md`) are NOT changed.\n- JIT Index entries for `src/`, `spacetimedb/`, `tests/`, etc. are NOT changed.\n\n## Append OKF Section\n\nIf not already present, append the standard OKF Knowledge Bundle section from `templates/okf/AGENTS-OKF-SECTION.md`. This section includes:\n\n- Agent Onboarding steps (read `knowledge/index.md`, `knowledge/state/index.md`, `knowledge/deprecation/index.md`)\n- Legacy Documentation explanation (if the project has existing docs)\n- After Completing Work instructions (write to `knowledge/inbox/`)\n- Curation description (curation agent processes inbox into concepts)\n- Concept Types table\n- Rules (never delete, always update indexes, one concept per file, etc.)\n\nThe installer's Step 5 handles the initial append. This phase handles the full migration of existing references.\n\n## Verification\n\nAfter migration, verify:\n- No AFFiNE references remain: `grep -i affine AGENTS.md`\n- No `docs/agents/` references remain: `grep \"docs/agents/\" AGENTS.md`\n- OKF Knowledge Bundle section exists: `grep \"OKF Knowledge Bundle\" AGENTS.md`\n\nSee [Verify Deployment](./verify-deployment.md) for the full verification checklist.\n"},{"filepath":"process/planning-agent-contracts.md","content":"---\ntype: Process\ntitle: Planning Agent Contracts\ndescription: Codex global planning agent pack defining orchestrator, specialist roles, shared brief, and delegation rules\nresource: ./templates/instructional-documents/codex-global-planning-agents.md\ntags: [designs, codex, planning, agents, orchestrator, specialists, contracts, delegation]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Planning Agent Contracts\n\n## Overview\n\nThe v1 planning pack installed under `~/.codex/agents/` defines the source-of-truth contract for global planning agents used by `/plan-feature`, `/plan-bugfix`, and `/plan-github`.\n\n## Goals\n\n- Keep planning orchestration separate from implementation work\n- Push lower-cost analysis into specialist agents\n- Reduce context repetition through a condensed shared brief\n- Keep delegated work observable through Codex subagent activity\n\n## Agent Roster\n\n| Agent | Sandbox | Responsibility | Final Publisher |\n|-------|---------|---------------|-----------------|\n| blueprint_orchestrator | workspace-write | Interview, delegate, synthesize, publish GitHub planning artifacts | Yes |\n| req-analyst | read-only | Requirement clarity, scope gaps, acceptance framing | No |\n| ux-analyst | read-only | Workflow, operator experience, screen impact | No |\n| scenario-analyst | read-only | Happy path, edge cases, regression scenarios | No |\n| tech-analyst | read-only | Constraints, dependencies, sequencing risks | No |\n| prd-writer | read-only | Draft issue-ready blueprint sections, acceptance criteria | No |\n\n## Operating Modes\n\n- `quick-fix`: minimize specialist calls, keep issue tree narrow\n- `standard`: normal planning path with smallest specialist set\n- `full-planning`: full multi-agent flow with canary validation\n\nConfidence policy: High = proceed; Medium = proceed with named assumptions; Low = ask one focused question.\n\n## Ownership Boundaries\n\n- `blueprint_orchestrator` is planning-only. May create/edit planning issues and checklist, but not implementation code.\n- Specialists are read-only. They report findings, may not publish issues, edit checklist, or code.\n- Planning handoff stops at GitHub issues plus checklist updates.\n\n## Shared Brief Fields\n\n`planning_command`, `goal`, `inferred_intent`, `confidence`, `project_trajectory`, `active_vectors`, `current_scope`, `constraints`, `non_goals`, `references`, `lessons_learned`, `open_questions`, `expected_output`.\n\n## Communication Protocol\n\nOrchestrator-mediated (no direct peer-to-peer):\n1. Orchestrator decides if specialist is needed\n2. Delegates with shared brief and clear ask\n3. Specialists return fixed payload\n4. Orchestrator relays blockers/questions into later delegations\n\n### Specialist Payload\n\nEvery response must include: `task_id`, `owner`, `status`, `deps`, `blockers`, `next`, `eta`, `evidence`.\n\n### Status Lifecycle\n\n`queued -> claimed -> working -> blocked | ready -> done`\n\n## Delegation Rules\n\n- Infer operating mode and confidence before choosing specialists\n- Reuse smallest specialist set necessary\n- Prefer serial delegation when output changes next ask\n- Prefer parallel delegation only when brief and payload are stable\n- When stalled, narrow the ask or split work\n\n## Validation Contract\n\n- Canary order: `/plan-feature` -> `/plan-bugfix` -> `/plan-github`\n- Lessons from each pass feed into next shared brief\n- v1 does not depend on retrieval MCPs or web research\n\n## Related Concepts\n\n- [Builder Agent Contracts](./builder-agent-contracts.md)\n- [Planning Decomposition](./planning-decomposition.md)\n- [Agent Generation](./agent-generation.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n"},{"filepath":"process/planning-decomposition.md","content":"---\ntype: Process\ntitle: Planning Decomposition Workflow\ndescription: Converting user requests or issues into issue-ready specifications through planning orchestrators and specialist analysis\nresource: ./README.md\ntags: [designs, planning, decomposition, orchestrator, requirements, workflow]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Planning Decomposition Workflow\n\n## Overview\n\nPlanning decomposition is the process of converting user requests or existing GitHub issues into issue-ready specifications through a planning orchestrator with specialist analysis.\n\n## Planning Entrypoints\n\n| Entrypoint | When to Use |\n|------------|-------------|\n| `/plan-feature` | New feature |\n| `/plan-bugfix` | Bug investigation |\n| `/plan-github` | Existing issue or PR |\n\n## Decomposition Flow\n\n1. **Planning entrypoint** - User request or existing issue enters the pipeline\n2. **Planning orchestrator** - Routes to specialist analysis\n3. **Specialist analysis** (parallel or serial):\n   - Requirements analysis - clarity, scope gaps, acceptance framing\n   - UX and workflow analysis - operator experience, screen impact\n   - Scenario and regression analysis - happy path, edge cases, exceptions\n   - Technical feasibility analysis - constraints, dependencies, sequencing\n4. **Issue-ready specification** - Synthesized output from specialists\n5. **Plan vs Q&A review** - Validate completeness\n6. **Approval** - Plan approved or gaps found (return to orchestrator)\n7. **Epic or parent issue** - Created on approval\n8. **Phase/sprint issue** - Decomposed from epic\n9. **Task issues** - With acceptance criteria\n10. **Local checklist** - Mirrors issue numbers\n11. **Planning approval** - Ready for build session or needs clarification\n\n## Mermaid Diagram\n\nThe README contains a mermaid flowchart visualizing this decomposition from \"User request or existing GitHub issue\" through to \"Ready for build session\".\n\n## Operating Modes\n\nThe planning orchestrator infers the operating mode from the user's wording, project trajectory, and risk:\n- `quick-fix`: Minimal specialist calls, narrow issue tree, smallest useful plan\n- `standard`: Normal planning path with smallest specialist set needed\n- `full-planning`: Full multi-agent planning flow with canary validation\n\n## Related Concepts\n\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Planning Agent Contracts](./planning-agent-contracts.md)\n- [Builder Agent Contracts](./builder-agent-contracts.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Kickoff Requirements](./kickoff-requirements.md)\n- [Workflow Guide](./workflow-guide.md)\n- [GitHub Workflow Guide](./github-workflow.md)\n"},{"filepath":"process/process-github-epics.md","content":"---\ntype: Process\ntitle: Process GitHub Epics\ndescription: How to convert closed GitHub epics into OKF knowledge entries\nresource: ./templates/okf/DEPLOYMENT-RUNBOOK.md\ntags: [okf, github, epics, issues, gh-cli]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Process GitHub Epics\n\nPhase 3 of the OKF deployment workflow. Closed GitHub epics contain rich context (pre-approved directives, acceptance criteria, linked issues, reasoning) that should be captured as knowledge concepts.\n\n## Step 1: List Closed Epics\n\n```bash\ngh issue list --label epic --state closed --limit 100 --json number,title,closedAt\n```\n\nThis returns a JSON array of closed epics with their number, title, and closure date.\n\n## Step 2: Fetch Each Epic Body\n\n```bash\ngh issue view <number> --json body,title,labels,closedAt\n```\n\nFetch the full issue body for each epic. The body typically contains the epic's scope, acceptance criteria, implementation notes, and outcome summary.\n\n## Step 3: Create Concept Entries\n\n### Recent Epics (Last 3-6 Months)\n\nCreate full Process or Domain concepts describing:\n- What was built\n- The outcome and current state\n- Key decisions made during the epic\n- Acceptance criteria and whether they were met\n\nInclude `issue_refs` in frontmatter to link back to the GitHub issue:\n\n```yaml\n---\ntype: Process\ntitle: Route Geometry Pipeline\ndescription: Epic #1495 - replaced old routing engine with geometry-based pipeline\nresource: ./docs/design/ROUTE-GEOMETRY.md\ntags: [routing, geometry, pipeline, epic]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\nissue_refs: [1495]\n---\n```\n\n### Older Epics\n\nCreate Deprecation entries with reasoning. These record what was built and why it was superseded or removed:\n\n```yaml\n---\ntype: Deprecation\ntitle: Old Routing Engine\ndescription: Epic #1200 - superseded by geometry-based pipeline in epic #1495\nresource: ./docs/design/OLD-ROUTING.md\ntags: [routing, deprecated, epic]\ntimestamp: 2026-03-15T10:00:00Z\nstatus: deprecated\nsupersedes: [route-geometry-pipeline.md]\nissue_refs: [1200]\n---\n```\n\nInclude `issue_refs` and `supersedes` where applicable.\n\n## Step 4: Update Indexes and Log\n\nAfter creating all epic concepts:\n- Update `index.md` files in the relevant directories with new concept rows.\n- Update the root `index.md` with accurate counts.\n- Update `knowledge/log.md` with an epic processing entry.\n\n## Enrichment During Curation\n\nThe curation agent also fetches GitHub issues referenced by `issue_refs` in inbox item frontmatter. During a [curation pass](./curation-pass.md), the agent uses `gh issue view <number> --json body,title,labels,closedAt` to enrich concepts with full issue context. Issues contain pre-approved directives, acceptance criteria, linked epics, and full reasoning that goes beyond commit messages.\n\n## Relationship to Other Phases\n\nThis phase runs after [Seed From Existing Docs](./seed-from-existing-docs.md) (Phase 2) and before [Curation Pass](./curation-pass.md) (Phase 6). The epic concepts are integrated into the knowledge base and cross-linked during the curation pass.\n"},{"filepath":"process/seed-from-existing-docs.md","content":"---\ntype: Process\ntitle: Seed Knowledge From Existing Docs\ndescription: How to create OKF concepts from a project's existing documentation\nresource: ./templates/okf/DEPLOYMENT-RUNBOOK.md\ntags: [okf, seeding, docs, legacy, concepts]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Seed Knowledge From Existing Docs\n\nPhase 2 of the OKF deployment workflow. This is the most important phase because it establishes the knowledge baseline. The agent reads the project's existing documentation and creates OKF concepts for each significant topic.\n\n## Source Material Priority\n\nRead in this order:\n\n1. `AGENTS.md` (root) - extract architecture decisions, agent definitions, conventions, deployment gates, key patterns.\n2. `docs/` - read all markdown files, extracting design decisions, architecture patterns, runbooks.\n3. `docs/design/` - architecture docs, reference docs, pattern docs.\n4. `docs/agents/` - agent knowledge spaces, specialist curation.\n5. `README.md` - project overview, setup commands.\n6. Any `src/AGENTS.md` or sub-directory `AGENTS.md` files.\n\n## Concept Creation Rules\n\n- One concept per file. Do not mix topics.\n- Use the correct concept type for each file. See [Concept Types](../domain/concept-types.md).\n- Every concept must have YAML frontmatter with at minimum: `type`, `title`, `description`, `tags`, `timestamp`, `status`.\n- The `resource` field should point to the source doc or code file that the concept summarises. Use relative paths from the project root (e.g., `./docs/design/ARCHITECTURE.md`).\n- Do NOT duplicate the full content of existing docs into concepts. The concept is a typed, searchable summary. The `resource` field links to the full doc.\n- For docs that describe multiple topics, create separate concepts for each significant topic.\n- Use consistent, lowercase tags across all concepts.\n\n## Concept Type Assignment\n\n| Source material | Concept type | Directory |\n|----------------|-------------|-----------|\n| System architecture, data models, infrastructure | Architecture | `architecture/` |\n| UI components, interaction patterns, HUD layouts | Component | `components/` |\n| Business logic, domain entities, workflows | Domain | `domain/` |\n| Architectural decisions, rationale, trade-offs | Decision | `decisions/` |\n| Workflows, sprint flow, deployment gates, runbooks, agent definitions | Process | `process/` |\n| Superseded patterns, removed features | Deprecation | `deprecation/` |\n| Current state of play | State | `state/` |\n\n## Volume Guidance\n\n- Expect 40-80 concepts for a mature project with substantial docs.\n- Do not create trivial concepts (e.g., \"project uses TypeScript\"). Focus on knowledge that helps an agent understand the system, make decisions, and avoid mistakes.\n- Every concept should answer: \"What would an agent need to know about this topic to work effectively?\"\n\n## Legacy Alignment\n\nFor projects with existing docs, concepts reference the source doc via the `resource` field rather than duplicating content. The concept provides a structured summary, tags, and type classification. The source doc provides the full content. See [Legacy Alignment Mode](../decisions/legacy-alignment-mode.md).\n\nA concept that references an existing doc should contain:\n- A summary of the doc's key content (not a copy, a synthesis)\n- The most important decisions, patterns, or rules from the doc\n- Tags that make it discoverable\n- The `resource` field pointing to the source doc path\n\n## After Seeding\n\nUpdate all `index.md` files with the new concepts and accurate counts. See [Index Structure](../domain/index-structure.md). Update `knowledge/log.md` with a seeding entry.\n\n## Relationship to Other Phases\n\nThis phase feeds into [Process GitHub Epics](./process-github-epics.md) (Phase 3), [Create Schema Diagrams](./create-schema-diagrams.md) (Phase 4), and [Curation Pass](./curation-pass.md) (Phase 6). The seeded concepts form the baseline that later phases enrich and the curation pass aligns.\n"},{"filepath":"process/stripe-payment-integration.md","content":"---\ntype: Process\ntitle: Stripe Payment Integration\ndescription: Stripe payment gateway setup with Payment Intents, Checkout Sessions, webhooks, and Convex-specific integration lessons\nresource: ./templates/instructional-documents/stripe-payment-gateway.md\ntags: [designs, stripe, payments, webhooks, convex, integration, checkout]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Stripe Payment Integration\n\n## Overview\n\nGuide for integrating Stripe as a payment gateway with support for credit cards, digital wallets, and subscription management.\n\n## Initial Setup\n\n1. Create Stripe account and get API keys (publishable `pk_` and secret `sk_`)\n2. Install: `npm install stripe @stripe/stripe-js`\n3. Use test keys during development, live keys only in production\n\n## Integration Options\n\n### Payment Intents API (Recommended)\n- Modern API handling complex payment flows including authentication\n- Server creates PaymentIntent, returns `client_secret` to frontend\n- Frontend uses `@stripe/react-stripe-js` to collect payment\n\n### Checkout Sessions (Hosted)\n- Pre-built hosted payment page, faster to implement\n- Server creates session with line items, returns URL\n- Redirect user to Stripe-hosted checkout\n\n## Webhook Handler (Critical for Production)\n\nWebhooks notify server about payment events. Must verify signature:\n- `payment_intent.succeeded`, `payment_intent.payment_failed`\n- `checkout.session.completed`\n\n## Convex Integration Lessons\n\n### Use `constructEventAsync` NOT `constructEvent`\n\nConvex uses SubtleCrypto which only supports async operations. Using the sync version fails with \"SubtleCryptoProvider cannot be used in synchronous context\".\n\n### Self-Hosted Convex Webhook Setup\n\n- HTTP routes on different port (3211 vs 3210 for functions)\n- Use Stripe CLI for local testing: `stripe listen --forward-to http://localhost:3211/stripe-webhook`\n- Set webhook secret without trailing whitespace\n\n### Payment Method Types\n\nStripe Checkout may create `card` or `link` payment method types. Handle both:\n- Card: has brand, last4, exp_month, exp_year\n- Link: accelerated checkout, no card details\n\n### Payment Methods May Not Be Listed on Customer\n\nAfter checkout, payment method might be on customer OR only on subscription's `default_payment_method`. Always check both locations.\n\n### Stripe SDK Property Names\n\nThe Stripe Node SDK uses **snake_case** for properties regardless of API version:\n- `subscription.current_period_start` (correct)\n- `subscription.currentPeriodStart` (TypeScript error)\n\n### Checkout Session Metadata\n\nPass custom data through checkout using `metadata` on both session and `subscription_data`. Access in webhook via `session.metadata?.organisationId`.\n\n### Convex HTTP Action Structure\n\nWebhook handler defined in `convex/http.ts` using `httpAction` and `httpRouter`. Runs on Convex backend infrastructure, not Vercel.\n\n## Summary Checklist\n\n- Use correct API version matching SDK types\n- Use `constructEventAsync` for webhook verification\n- Handle multiple payment method types (card, link)\n- Check both customer and subscription for payment methods\n- Use snake_case for Stripe SDK properties\n- Pass metadata through checkout for webhook access\n- Use HTTP port 3211 for local Convex webhooks\n\n## Related Concepts\n\n- [Convex Self-Hosted Setup](./convex-self-hosted.md)\n- [WorkOS Auth Integration](./workos-auth-integration.md)\n- [Deployment Guide](./deployment-guide.md)\n"},{"filepath":"process/verify-deployment.md","content":"---\ntype: Process\ntitle: Verify OKF Deployment\ndescription: Verification checklist for confirming a complete OKF deployment\nresource: ./templates/okf/DEPLOYMENT-RUNBOOK.md\ntags: [okf, verification, deployment, quality-check]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Verify OKF Deployment\n\nPhase 8 of the OKF deployment workflow. Run these verification steps to confirm the deployment is complete and correct.\n\n## 1. Verify Concept Counts\n\nCount concepts per directory and verify `index.md` counts match:\n\n```bash\nfor dir in architecture components domain decisions process deprecation state; do\n  count=$(find knowledge/$dir -name \"*.md\" -not -name \"index.md\" | wc -l)\n  echo \"  $dir: $count\"\ndone\n```\n\nCompare the output to the counts in `knowledge/index.md`. Every mismatch must be fixed by updating the index. See [Index Structure](../domain/index-structure.md).\n\n## 2. Verify No AFFiNE References\n\n```bash\ngrep -i affine AGENTS.md\n```\n\nThis should return no results. If AFFiNE references remain, complete the [AGENTS.md migration](./migrate-agents-md.md).\n\n## 3. Verify No docs/agents/ References\n\n```bash\ngrep \"docs/agents/\" AGENTS.md\n```\n\nThis should return no results. If `docs/agents/` references remain, update them to point to `knowledge/process/` equivalents.\n\n## 4. Verify OKF Knowledge Bundle Section\n\n```bash\ngrep \"OKF Knowledge Bundle\" AGENTS.md\n```\n\nThis should return a match. The section should contain agent onboarding steps, after-completing-work instructions, curation description, concept types table, and rules.\n\n## 5. Verify Post-Commit Hook\n\n```bash\ngit config core.hooksPath\nls -la .githooks/post-commit\n```\n\n- `git config core.hooksPath` should return `.githooks`.\n- `.githooks/post-commit` should exist and be executable (permission bits include `x`).\n\nSee [Hook System](../architecture/hook-system.md) and [Installer Design](../architecture/installer-design.md).\n\n## 6. Verify Viewer Files\n\n```bash\nls -lh knowledge/viz.html\nls -lh knowledge/viewer.html\nls -lh knowledge/generate-viz.js\n```\n\n- `viewer.html` should exist (copied by installer).\n- `generate-viz.js` should exist (copied by installer).\n- `viz.html` should exist (generated by running `generate-viz.js`). File size should be 100KB-500KB depending on concept count.\n\nOpen `viz.html` in a browser and verify:\n- Browse tab shows folder tree with all concept directories.\n- Graph tab shows the knowledge graph with typed nodes and edges.\n- Clicking a concept shows its rendered markdown.\n- Mermaid diagrams render inline (if any concepts have mermaid code blocks).\n- Relative links in concept bodies navigate within the viewer.\n- Search filtering works.\n\nSee [Viewer Architecture](../architecture/viewer-architecture.md) and [Viz Generator Design](../architecture/viz-generator-design.md).\n\n## 7. Verify Knowledge Structure\n\n```bash\nls knowledge/\n```\n\nShould show: `index.md`, `log.md`, `inbox/`, `architecture/`, `components/`, `domain/`, `decisions/`, `process/`, `deprecation/`, `state/`, `viewer.html`, `generate-viz.js`, `viz.html`.\n\nEach subdirectory should have an `index.md` file.\n\n## Post-Verification\n\nIf all checks pass, the deployment is complete. The project is ready for ongoing OKF usage as described in the [deployment workflow](./deploy-okf.md).\n\nIf any checks fail, return to the relevant phase and fix the issue before considering the deployment complete.\n"},{"filepath":"process/workflow-guide.md","content":"---\ntype: Process\ntitle: Workflow Guide\ndescription: HTML-based operating model for planning, approvals, CI/CD, QA, production approval, and closeout\nresource: ./docs/workflow-guide/index.html\ntags: [designs, workflow, guide, html, operating-model, planning, approvals, ci-cd, qa]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# Workflow Guide\n\n## Overview\n\nThe workflow guide is a persistent HTML operating model hosted on GitHub Pages at `https://holovkat.github.io/designs/workflow-guide/`. It is the canonical detailed operating model for planning, approvals, CI/CD, QA, production approval, and closeout.\n\n## Structure\n\nThe guide is a single-page HTML application with:\n- Topbar with brand, navigation tabs (Workflow, Install, README, Source), theme toggle, and contents drawer\n- Sidebar drawer with section navigation cards\n- Main content area with scrollable sections\n\n## Sections\n\nThe guide covers these workflow areas:\n\n| Section | Description |\n|---------|-------------|\n| Overview | Generic operating model and document roles |\n| Installation | Install commands and skills globally or inside a project |\n| Commands | Reference workflow commands and expected outputs |\n| Intent Confidence | Infer the next step before asking process questions |\n| Planning Intake | Choose the planning entrypoint for the work type |\n| Planning Decomposition | Convert intent into issues, tasks, and checklist mirrors |\n| Approval Gates | (and subsequent sections for the full lifecycle) |\n\n## Related Pages\n\n- `install.html` - Instructions and common prompt for installing commands and skills\n- `assets/workflow.css` - Stylesheet\n- `assets/workflow.js` - JavaScript functionality\n\n## GitHub Pages\n\nThe README serves as the GitHub index. The rendered Pages site redirects to the workflow guide. The guide is the source of truth for the full operating model.\n\n## Related Concepts\n\n- [Planning Decomposition](./planning-decomposition.md)\n- [Delivery Lifecycle](./delivery-lifecycle.md)\n- [Install Session Workflows](./install-session-workflows.md)\n- [Implementation Checklist](./implementation-checklist.md)\n- [Documentation-First Approach](../decisions/documentation-first-approach.md)\n"},{"filepath":"process/workos-auth-integration.md","content":"---\ntype: Process\ntitle: WorkOS Auth Integration\ndescription: WorkOS authentication with SSO, AuthKit, OAuth, Magic Link, session management, and multi-tenant support\nresource: ./templates/instructional-documents/work-os-auth.md\ntags: [designs, workos, authentication, sso, oauth, authkit, session, multi-tenant]\ntimestamp: 2026-06-29T14:30:00Z\nstatus: active\n---\n\n# WorkOS Auth Integration\n\n## Overview\n\nWorkOS provides enterprise-ready authentication with support for SAML, OAuth, and Magic Link.\n\n## Setup\n\n1. Create WorkOS account and get API Key and Client ID\n2. Configure redirect URI (e.g., `http://localhost:3000/callback`)\n3. Set environment variables: `WORKOS_API_KEY`, `WORKOS_CLIENT_ID`, `WORKOS_REDIRECT_URI`\n4. Install: `npm install @workos-inc/node`\n\n## Backend Implementation\n\n### Authorization URL Endpoint\nGenerates SSO login URL with provider selection (authkit, GoogleOAuth, MicrosoftOAuth, etc.).\n\n### Callback Endpoint\nExchanges authorization code for user profile via `authenticateWithCode`. Stores user session with user ID and access token.\n\n### Logout Endpoint\nDestroys session and redirects to home.\n\n### Route Pr
